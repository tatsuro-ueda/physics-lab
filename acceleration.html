<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加速度 | タブレット物理実験ラボ</title>
<style>
  :root { --phx-orange: #ffe000; --ax-x: #ff9500; --ax-y: #d4c400; --ax-z: #e04040; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #1a1a1a;
    color: #eee;
    margin: 0;
  }
  header {
    background: var(--phx-orange);
    color: #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 8px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header a.back {
    color: #1a1a1a; text-decoration: none;
    font-size: 1.4rem; padding: 8px 12px;
  }
  header .title { font-size: 1.1rem; font-weight: bold; flex: 1; }
  header button {
    background: none; border: none; color: #1a1a1a;
    font-size: 1.5rem; padding: 8px 12px; cursor: pointer;
  }
  header a.dl { color: #1a1a1a; text-decoration: none; font-size: 1.3rem; padding: 8px 12px; }
  main { max-width: 760px; margin: 0 auto; padding: 8px; }
  .card {
    margin-bottom: 10px;
    border: 1px solid #333;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
  }
  .card .head {
    background: #2b2b2b;
    text-align: center;
    font-size: 0.9rem;
    display: flex;
    justify-content: space-between;
    padding: 5px 10px;
  }
  .card .val { font-variant-numeric: tabular-nums; color: #bbb; }
  .card canvas { display: block; width: 100%; height: 150px; background: #000; }
  /* 拡大表示 */
  body.zoom .card { display: none; }
  body.zoom .card.zoomed { display: block; }
  body.zoom .card.zoomed canvas { height: 60vh; }
  body.zoom .card.zoomed .head { font-size: 1.1rem; }
  .hint { text-align: center; color: #888; font-size: 0.8rem; margin: 12px 0; }
  .controls { text-align: center; margin: 8px 0; color: #aaa; font-size: 0.9rem; }
  #err { color: #f88; text-align: center; }
  /* 🔰チュートリアルの見た目は tutorial.js（共通エンジン）が持つ */
</style>
</head>
<body>
<header>
  <a class="back" href="index.html" id="backLink">←</a>
  <div class="title">加速度</div>
  <button id="playBtn" title="計測開始">▶</button>
  <button id="resetBtn" title="計測を止めてデータを消す">🗑</button>
  <a class="dl" href="acceleration.html" download title="このページのHTMLファイルをダウンロード">⬇</a>
  <button id="missionBtn" title="チュートリアル（グラフの読み方を体験で学ぶ）">🔰</button>
</header>

<main>
  <div class="controls">
    <label><input type="checkbox" id="gravity" checked> 重力をふくめる</label>
    　／　m/s²
  </div>

  <div id="tutorialMount"></div>   <!-- 🔰チュートリアルのパネルはここに tutorial.js が差し込む -->

  <div class="card" id="card-x">
    <div class="head"><span style="color:var(--ax-x)">加速度 x（スクリーン右方向）</span><span class="val" id="val-x">--</span></div>
    <canvas id="cv-x" width="720" height="300"></canvas>
  </div>
  <div class="card" id="card-y">
    <div class="head"><span style="color:var(--ax-y)">加速度 y（スクリーン上方向）</span><span class="val" id="val-y">--</span></div>
    <canvas id="cv-y" width="720" height="300"></canvas>
  </div>
  <div class="card" id="card-z">
    <div class="head"><span style="color:var(--ax-z)">加速度 z（スクリーン手前方向）</span><span class="val" id="val-z">--</span></div>
    <canvas id="cv-z" width="720" height="300"></canvas>
  </div>

  <p id="err"></p>
  <p class="hint" id="hint"><b>線をタップ</b>＝値、<b>まわりをタップ</b>＝拡大</p>
</main>

<script>
// =====================================================================
// タブレット物理実験ラボ 共通部品（正本はこのファイル1つだけ）
// ---------------------------------------------------------------------
// 3軸センサーページ（acceleration / gyroscope / magnetometer）の
// グラフ描画・タップ操作・拡大縮小・▶⏸・🗑・⬇ を全部ここで引き受ける。
// 各ページは createXYZLab({...}) を1回呼び、センサー固有の処理だけ書く。
// どこに何があるかは README.md の「部品対応表」を参照。
// =====================================================================

function createXYZLab(cfg) {
  // cfg.unit      : 表示単位（例 'm/s²'）
  // cfg.digits    : ヘッダー現在値の小数桁数
  // cfg.padMin    : 縦軸autoスケールの最小余白（グラフが平らな時の見た目を決める）
  // cfg.noDataMsg : 3秒待ってもデータが来ないときの案内（HTML可）
  // cfg.start     : async (lab) => エラーメッセージ or null。許可取得とリスナー登録を行う
  // cfg.onReset   : （任意）🗑時のページ固有の後始末

  const AXES = ['x', 'y', 'z'];
  const COLORS = { x: '#ff9500', y: '#d4c400', z: '#e04040' };
  const HIT_PX = 30;          // 「線の上」とみなすタップ距離（canvas座標）
  const MAX_SAMPLES = 150000; // 安全上限（約40分ぶん）

  const buf = { x: [], y: [], z: [] };  // 値（全履歴を保持）
  const tbuf = [];                       // 経過時間（秒）。phyphox同様、時間軸を圧縮して全体を表示
  const marker = { x: null, y: null, z: null };
  let t0 = null;
  let running = false;
  let started = false;
  let gotData = false;

  const playBtn = document.getElementById('playBtn');
  const errEl = document.getElementById('err');

  // ---- 時間軸 ----
  function timeSpan() {
    return Math.max(tbuf.length ? tbuf[tbuf.length - 1] : 0, 2);
  }

  function pickTimeStep(span) {
    const steps = [0.5, 1, 2, 5, 10, 15, 30, 60, 120, 300, 600];
    for (const s of steps) if (span / s <= 8) return s;
    return 1200;
  }

  // タップ位置の時刻に一番近いサンプルを探す
  function nearestIndex(targetT) {
    const len = tbuf.length;
    let i = Math.min(Math.max(Math.round(targetT / timeSpan() * (len - 1)), 0), len - 1);
    for (let j = Math.max(0, i - 30); j < Math.min(len, i + 30); j++) {
      if (Math.abs(tbuf[j] - targetT) < Math.abs(tbuf[i] - targetT)) i = j;
    }
    return i;
  }

  // ---- 拡大縮小 ----
  function toggleZoom(card) {
    if (document.body.classList.contains('zoom')) {
      document.body.classList.remove('zoom');
      card.classList.remove('zoomed');
    } else {
      document.body.classList.add('zoom');
      card.classList.add('zoomed');
    }
  }

  // ---- タップ操作：線の近く→値を表示／それ以外→拡大・縮小 ----
  AXES.forEach(ax => {
    const card = document.getElementById('card-' + ax);
    card.querySelector('.head').addEventListener('click', () => toggleZoom(card));
    const cvEl = document.getElementById('cv-' + ax);
    cvEl.addEventListener('click', (ev) => {
      const rect = cvEl.getBoundingClientRect();
      const cx = (ev.clientX - rect.left) / rect.width * cvEl.width;
      const cy = (ev.clientY - rect.top) / rect.height * cvEl.height;
      const arr = buf[ax];
      if (arr.length >= 2) {
        let min = Math.min(...arr), max = Math.max(...arr);
        const pad = Math.max((max - min) * 0.15, cfg.padMin);
        min -= pad; max += pad;
        const i = nearestIndex(cx / cvEl.width * timeSpan());
        const ly = cvEl.height - ((arr[i] - min) / (max - min)) * cvEl.height;
        if (Math.abs(cy - ly) < HIT_PX) { marker[ax] = i; return; }   // 線の上→値
      }
      toggleZoom(card);                                                // 線の外→拡大/縮小
    });
  });

  // ---- ▶⏸：計測の開始・一時停止 ----
  playBtn.addEventListener('click', async () => {
    if (running) {                    // 一時停止
      running = false;
      playBtn.textContent = '▶';
      return;
    }
    if (!started) {
      const err = await cfg.start(api);   // 許可取得＋リスナー登録（ページ固有）
      if (err) { errEl.innerHTML = err; return; }
      started = true;
      setTimeout(() => {
        if (!gotData) errEl.innerHTML = cfg.noDataMsg;
      }, 3000);
      draw();
    }
    // 再開時：ポーズしていた時間を除いて時間軸を連続させる
    if (tbuf.length) t0 = performance.now() / 1000 - tbuf[tbuf.length - 1];
    AXES.forEach(ax => marker[ax] = null);   // 再開時はタップ値の表示を消す
    running = true;
    errEl.textContent = '';
    playBtn.textContent = '⏸';
  });

  // ---- 🗑：計測を止めてデータを消す（phyphoxのデータ削除と同じ） ----
  document.getElementById('resetBtn').addEventListener('click', () => {
    running = false;
    playBtn.textContent = '▶';
    t0 = null;
    tbuf.length = 0;
    AXES.forEach(ax => {
      buf[ax].length = 0;
      marker[ax] = null;
      document.getElementById('val-' + ax).textContent = '--';
      const c = document.getElementById('cv-' + ax);
      c.getContext('2d').clearRect(0, 0, c.width, c.height);
    });
    if (cfg.onReset) cfg.onReset();
  });

  // ---- ⬇：ダウンロードは<a download>の標準動作に任せる ----
  // 配信されるHTMLは build.py が共通JSを埋め込んだ単一ファイルなので、そのまま保存すれば完結する。

  // ---- データ受け入れ口（ページ固有リスナーから呼ばれる） ----
  function push(x, y, z) {
    if (!running) return;
    gotData = true;
    const now = performance.now() / 1000;
    if (t0 === null) t0 = now;
    tbuf.push(now - t0);
    buf.x.push(x); buf.y.push(y); buf.z.push(z);
    AXES.forEach(ax => {
      document.getElementById('val-' + ax).textContent =
        buf[ax][buf[ax].length - 1].toFixed(cfg.digits) + ' ' + cfg.unit;
    });
    if (tbuf.length > MAX_SAMPLES) {
      running = false;
      playBtn.textContent = '▶';
      errEl.textContent = '記録が長くなったので自動停止しました（🗑 で消去できます）';
    }
  }

  // ---- 描画（phyphox方式：時間軸を圧縮して全履歴を表示） ----
  function draw() {
    requestAnimationFrame(draw);
    AXES.forEach(ax => drawGraph(
      document.getElementById('cv-' + ax), buf[ax], COLORS[ax], marker[ax]));
  }

  function drawGraph(cv, arr, color, mIdx) {
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    ctx.clearRect(0, 0, W, H);
    if (arr.length < 2) return;

    const span = timeSpan();

    // 縦の自動スケール
    let min = Math.min(...arr), max = Math.max(...arr);
    const pad = Math.max((max - min) * 0.15, cfg.padMin);
    min -= pad; max += pad;
    const toX = t => (t / span) * W;
    const toY = v => H - ((v - min) / (max - min)) * H;

    // 横グリッド（値）
    ctx.strokeStyle = '#2a2a2a';
    ctx.fillStyle = '#888';
    ctx.font = '13px sans-serif';
    for (let i = 0; i <= 4; i++) {
      const v = min + (max - min) * i / 4;
      const y = toY(v);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      ctx.fillText(v.toFixed(1), 6, Math.min(Math.max(y - 4, 14), H - 4));
    }
    // 縦グリッド（時間）
    const tStep = pickTimeStep(span);
    for (let t = tStep; t < span; t += tStep) {
      const x = toX(t);
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      ctx.fillText((tStep < 1 ? t.toFixed(1) : Math.round(t)) + 's', x + 4, H - 6);
    }
    // ゼロ線を強調
    if (min < 0 && max > 0) {
      const y0 = toY(0);
      ctx.strokeStyle = '#555';
      ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(W, y0); ctx.stroke();
    }

    // データ線（サンプルが多いときは間引く）
    const len = arr.length;
    const stride = Math.max(1, Math.floor(len / W));
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(toX(tbuf[0]), toY(arr[0]));
    for (let i = stride; i < len; i += stride) {
      ctx.lineTo(toX(tbuf[i]), toY(arr[i]));
    }
    ctx.lineTo(toX(tbuf[len - 1]), toY(arr[len - 1]));
    ctx.stroke();

    // タップした点の値（有効数字2桁）
    if (mIdx !== null && mIdx < len) {
      const x = toX(tbuf[mIdx]);
      const y = toY(arr[mIdx]);
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();
      const label = Number(arr[mIdx].toPrecision(2)).toString();
      ctx.font = 'bold 16px sans-serif';
      const tw = ctx.measureText(label).width;
      const lx = Math.min(Math.max(x - tw / 2, 4), W - tw - 4);
      const ly = y > 34 ? y - 14 : y + 28;
      ctx.fillStyle = 'rgba(0,0,0,0.75)';
      ctx.fillRect(lx - 4, ly - 16, tw + 8, 22);
      ctx.fillStyle = '#fff';
      ctx.fillText(label, lx, ly);
    }
  }

  const api = {
    push,
    isRunning: () => running,
    // 🔰ミッション用フック（ページ固有スクリプトから拡大・数値表示を判定するため）
    hasMarker: () => AXES.some(ax => marker[ax] !== null),
    isZoomed: () => document.body.classList.contains('zoom'),
    // タブ離脱などで計測を止め、センサーを手放す（cfg.stop でページ固有リスナーを解除させる）。
    // started を戻すので、次に ▶ を押すと cfg.start が再度呼ばれてリスナーが張り直される。
    release: () => {
      running = false;
      started = false;
      playBtn.textContent = '▶';
      if (cfg.stop) cfg.stop();
    },
  };
  return api;
}
</script>
<script>
// ============================================================
// 🔰チュートリアル共通エンジン（正本はこのファイル1つ）
// ------------------------------------------------------------
// 進捗ドット・「あと◯つ」・完了/もっとやる・localStorage・🔰トグル・
// 見た目(CSS)・パネルDOM を全部ここが持つ。加速度・音響SW など各ページは
// createTutorial({...}) を1回呼び、ステップ定義と入力の与え方だけ書く。
//
// 入力の与え方（どちらでも可・併用可）:
//   tut.tick(e)          … 動き駆動（毎フレーム呼ぶ。加速度の devicemotion）
//   tut.event(name, data)… イベント駆動（音響SWの armed/measuring/done）
//
// ステップ定義（factory は api を受け取り、ステップ実体を返す）:
//   (api) => ({
//     html: () => '文言',
//     tick?: (e)=>bool,          // 動き駆動でクリア判定（true でクリア）
//     needsActive?: true,        // 計測中(cfg.isActive)のときだけ tick する
//     on?: 'done', check?, fail?,// イベント駆動。check偽なら api.note(fail(data))
//     observe?: true,            // 「見えた！つぎへ」ボタンで進むステップ
//     guess?: true, onGuess?:(g)=>void,  // 予想ボタン（cfg.guessOptions 必須）
//   })
//   api = { note(t), markGuess(g), setQuestion(t), isActive() }
// ============================================================
(function () {
  const CSS = `
  .missions { max-width: 760px; margin: 0 auto 10px; background:#22261c; border:1px solid #4a5334; border-radius:6px; padding:10px 14px; font-size:0.95rem; text-align:left; }
  .m-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .m-head .m-title { color:#a8c26a; font-weight:bold; }
  .m-dots { letter-spacing:3px; font-size:0.9rem; color:#4a5334; }
  .m-dots .on { color:#ffe000; } .m-dots .now { color:#a8c26a; } .m-dots .m-remain { color:#a8c26a; font-size:0.8rem; }
  .m-body { color:#eee; padding:4px 0; min-height:1.5rem; }
  .m-body.cleared { animation:m-flash 0.9s; }
  @keyframes m-flash { 0%{background:#4a5334;} 100%{background:transparent;} }
  .m-guess { margin-top:8px; }
  .m-guess button { background:#333; color:#eee; border:1px solid #555; border-radius:6px; padding:5px 16px; margin:0 3px; cursor:pointer; font-size:0.95rem; }
  .m-guess button.picked { background:#ffe000; color:#1a1a1a; border-color:#ffe000; }
  .m-next { background:#ffe000; color:#1a1a1a; border:none; border-radius:6px; padding:6px 18px; margin-top:8px; cursor:pointer; font-size:0.95rem; }
  .m-note { color:#e8a56a; margin-top:6px; font-size:0.85rem; min-height:1rem; }
  .m-done-btns { text-align:right; margin-top:8px; }
  .m-done-btns button { background:#333; color:#eee; border:1px solid #555; border-radius:6px; padding:6px 18px; margin-left:8px; cursor:pointer; font-size:0.95rem; }
  .m-done-btns button.m-more { background:#ffe000; color:#1a1a1a; border-color:#ffe000; }
  .tut-pulse { animation:m-pulse 1.1s ease-in-out 4; }
  @keyframes m-pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.35);} }
  `;
  const PANEL =
    '<div class="missions" hidden>' +
    '<div class="m-head"><span class="m-title">🔰 チュートリアル</span><span class="m-dots"></span></div>' +
    '<div class="m-body"></div>' +
    '<div class="m-guess" hidden></div>' +
    '<button class="m-next" hidden>見えた！つぎへ</button>' +
    '<div class="m-note"></div>' +
    '<div class="m-done-btns" hidden>' +
    '<button class="m-restart">最初から</button>' +
    '<button class="m-more">もっとやる</button>' +
    '<button class="m-close">閉じる</button>' +
    '</div></div>';

  window.createTutorial = function (cfg) {
    // cfg: { keyPrefix, mountId, toggleBtnId, steps[], moreSteps[]?, completeText?,
    //        guessOptions?, isActive?, inactiveNote? }
    if (!document.getElementById('tutorial-css')) {
      const st = document.createElement('style');
      st.id = 'tutorial-css'; st.textContent = CSS;
      document.head.appendChild(st);
    }
    const mount = document.getElementById(cfg.mountId);
    mount.innerHTML = PANEL;
    const panel = mount.querySelector('.missions');
    const mDots = panel.querySelector('.m-dots');
    const mBody = panel.querySelector('.m-body');
    const mGuess = panel.querySelector('.m-guess');
    const mNext = panel.querySelector('.m-next');
    const mNote = panel.querySelector('.m-note');
    const mDoneBtns = panel.querySelector('.m-done-btns');
    const mRestart = panel.querySelector('.m-restart');
    const mMore = panel.querySelector('.m-more');
    const mClose = panel.querySelector('.m-close');
    const toggleBtn = document.getElementById(cfg.toggleBtnId);

    const M_KEY = cfg.keyPrefix + '-step';
    const SEEN_KEY = cfg.keyPrefix + '-seen';
    const hasMore = cfg.moreSteps && cfg.moreSteps.length > 0;
    const rand = (a) => a[Math.floor(Math.random() * a.length)];

    if (cfg.guessOptions) {
      mGuess.innerHTML = '予想：' +
        cfg.guessOptions.map(g => '<button data-g="' + g + '">' + g + '</button>').join('');
    }
    function markGuess(picked) {
      mGuess.querySelectorAll('button').forEach(b => b.classList.toggle('picked', b.dataset.g === picked));
    }

    // ステップに渡す小さなAPI（DOMを直接触らせない）
    const api = {
      note: (t) => { mNote.textContent = t; },
      markGuess,
      setQuestion: (t) => { mBody.innerHTML = prefix() + t; },
      isActive: () => (cfg.isActive ? cfg.isActive() : true),
    };

    let mode = 'tutorial';
    let current = null;
    let stepIndex = 0;
    try { stepIndex = Math.max(0, Math.min(cfg.steps.length, parseInt(localStorage.getItem(M_KEY) || '0', 10))); } catch (e) {}
    function save() { try { localStorage.setItem(M_KEY, String(stepIndex)); } catch (e) {} }
    function prefix() { return mode === 'tutorial' ? '(' + (stepIndex + 1) + ') ' : '🔁 '; }

    function renderDots() {
      if (mode !== 'tutorial') { mDots.innerHTML = ''; return; }
      let s = '';
      for (let i = 0; i < cfg.steps.length; i++) {
        const cls = i < stepIndex ? 'on' : (i === stepIndex ? 'now' : '');
        s += '<span class="' + cls + '">●</span>';
      }
      const remain = cfg.steps.length - stepIndex;
      mDots.innerHTML = s + (remain > 0 ? ' <span class="m-remain">あと' + remain + 'つ</span>' : '');
    }

    function showComplete() {
      current = null; renderDots();
      mBody.innerHTML = cfg.completeText || '🎉 チュートリアル完了！';
      mNote.textContent = ''; mGuess.hidden = true; mNext.hidden = true;
      mDoneBtns.hidden = false; mRestart.hidden = false; mClose.hidden = false; mMore.hidden = !hasMore;
      toggleBtn.innerHTML = '🔰✅';
    }

    function load() {
      mNote.textContent = ''; markGuess(null);
      mNext.hidden = true; mDoneBtns.hidden = true; mGuess.hidden = true;
      if (mode === 'tutorial') {
        renderDots();
        if (stepIndex >= cfg.steps.length) { showComplete(); return; }
        current = cfg.steps[stepIndex](api);
        toggleBtn.innerHTML = '🔰';
      } else {
        mDots.innerHTML = '';
        current = rand(cfg.moreSteps)(api);
        mDoneBtns.hidden = false; mRestart.hidden = false; mClose.hidden = false; mMore.hidden = true;
      }
      mBody.innerHTML = prefix() + current.html();
      if (current.guess) mGuess.hidden = false;
      if (current.observe) mNext.hidden = false;
    }

    function clear() {
      mBody.classList.remove('cleared'); void mBody.offsetWidth; mBody.classList.add('cleared');
      current = null;
      if (mode === 'tutorial') { stepIndex++; save(); }
      setTimeout(load, 900);
    }

    // 入力: 動き駆動
    function tick(e) {
      if (!current || !current.tick) return;
      if (current.needsActive && !api.isActive()) {
        if (cfg.inactiveNote) mNote.textContent = cfg.inactiveNote;
        return;
      }
      if (current.tick(e)) clear();
    }
    // 入力: イベント駆動
    function event(name, data) {
      if (!current || current.observe || !current.on || current.on !== name) return;
      if (current.check && !current.check(data)) { mNote.textContent = current.fail ? current.fail(data) : 'もう一度'; return; }
      if (current.check) mNote.textContent = 'ぴったり！✅';
      clear();
    }

    mGuess.addEventListener('click', (ev) => {
      const b = ev.target.closest('button'); if (!b) return;
      markGuess(b.dataset.g);
      if (current && current.onGuess) current.onGuess(b.dataset.g);
    });
    mNext.addEventListener('click', () => { if (current && current.observe) clear(); });
    toggleBtn.addEventListener('click', () => {
      toggleBtn.classList.remove('tut-pulse');
      panel.hidden = !panel.hidden;
      try { localStorage.setItem(SEEN_KEY, '1'); } catch (e) {}
    });
    mRestart.addEventListener('click', () => { mode = 'tutorial'; stepIndex = 0; save(); load(); });
    mMore.addEventListener('click', () => { mode = 'more'; load(); });
    mClose.addEventListener('click', () => { panel.hidden = true; });

    load();
    let seen = false; try { seen = !!localStorage.getItem(SEEN_KEY); } catch (e) {}
    if (!seen) toggleBtn.classList.add('tut-pulse');

    return { tick, event };
  };
})();
</script>
<script>
// このページ固有：加速度センサー（devicemotion）との接続と、チュートリアルの「ステップ定義」だけ。
// グラフ・タップ・拡大・▶⏸🗑⬇は lab-common.js、チュートリアルの器は tutorial.js（どちらも正本）。

// iOS Safari は W3C仕様・Android と加速度の符号が逆（Apple CoreMotion の流儀）。
// phyphox-iOS も kG = -9.81 を掛けて反転している（ExperimentSensorInput.swift）ため、同じ補正を行う。
const IOS_SIGN = (typeof DeviceMotionEvent !== 'undefined' &&
                  typeof DeviceMotionEvent.requestPermission === 'function') ? -1 : 1;
const axVal = (l, ax) => ({ x: l.x, y: l.y, z: l.z }[ax]) * IOS_SIGN;   // 動きの加速度（重力なし）を軸ごとに符号補正
const rand = (a) => a[Math.floor(Math.random() * a.length)];

let motionHandler = null;   // devicemotion リスナー（タブ離脱時に解除してセンサーを手放す）
const lab = createXYZLab({
  unit: 'm/s²',
  digits: 1,        // ヘッダー現在値は小数1桁
  padMin: 0.5,
  noDataMsg: 'この端末では加速度センサーのデータが取れないようです（センサー非搭載の可能性）',
  start: async (lab) => {
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      try {
        const res = await DeviceMotionEvent.requestPermission();
        if (res !== 'granted') return 'センサーの使用が許可されませんでした';
      } catch (e) {
        return '許可の取得に失敗：' + e.message;
      }
    }
    motionHandler = (e) => {
      const a = document.getElementById('gravity').checked
        ? e.accelerationIncludingGravity : e.acceleration;
      if (a && a.x !== null) lab.push(a.x * IOS_SIGN, a.y * IOS_SIGN, a.z * IOS_SIGN);
      tut.tick(e);
    };
    window.addEventListener('devicemotion', motionHandler);
    return null;
  },
  stop: () => { if (motionHandler) { window.removeEventListener('devicemotion', motionHandler); motionHandler = null; } },
});

// 他のタブ・アプリに切り替えたら計測を止め、センサーを手放す（戻ってきても停止のまま）
document.addEventListener('visibilitychange', () => { if (document.hidden) lab.release(); });

// ---- チュートリアルのステップ定義（判定だけ書く。器は tutorial.js） ----
// 「どの軸？」問題：間違えたら次の方向へ差し替え（tutorialは上→右→下→左で循環）。
function makeAxisStep(api, dirs, startIdx) {
  let di = (startIdx == null) ? Math.floor(Math.random() * dirs.length) : startIdx;
  let guess = null, guessAt = 0;
  const label = () => dirs[di].label;
  const q = () => label() + 'サッと動かすと、どのグラフが動く？';
  return {
    html: q, guess: true, needsActive: true,
    onGuess(axis) { guess = axis; guessAt = performance.now(); api.note('予想したね。' + label() + '動かそう！'); },
    tick(e) {
      if (!e || !guess || performance.now() - guessAt < 500) return false;
      const l = e.acceleration; if (!l || l.x === null) return false;
      const v = { x: axVal(l, 'x'), y: axVal(l, 'y'), z: axVal(l, 'z') };
      let hit = null;
      if (Math.abs(v.x) > 3) hit = 'x'; else if (Math.abs(v.y) > 3) hit = 'y'; else if (Math.abs(v.z) > 2.5) hit = 'z';
      if (!hit) return false;
      if (hit === guess) { api.note('正解！動いたのは ' + hit + ' でした🎉'); return true; }
      di = (di + 1) % dirs.length; guess = null; api.markGuess(null);
      api.setQuestion(q());
      api.note('ちがったね（実測 ' + hit + '）。今度は「' + label() + '」で予想しよう');
      return false;
    },
  };
}
// 「山→谷 / 谷→山」問題（ランダム軸・順序）。
function makePeakStep(api) {
  const ax = rand(['x', 'y', 'z']);
  const up = Math.random() < 0.5;
  const th = ax === 'z' ? 2.5 : 3;
  let firstAt = null;
  return {
    html: () => ax + ' のグラフに「' + (up ? '山→谷' : '谷→山') + '」を作ろう',
    needsActive: true,
    tick(e) {
      if (!e) return false;
      const l = e.acceleration; if (!l || l.x === null) return false;
      const val = axVal(l, ax), now = performance.now();
      if (up) { if (val > th) firstAt = now; else if (val < -th && firstAt !== null && now - firstAt < 2000) return true; }
      else { if (val < -th) firstAt = now; else if (val > th && firstAt !== null && now - firstAt < 2000) return true; }
      return false;
    },
  };
}

const TUT_DIRS = [{ label: '上へ', axis: 'y' }, { label: '右へ', axis: 'x' }, { label: '下へ', axis: 'y' }, { label: '左へ', axis: 'x' }];
const STEPS = [
  () => ({ html: () => '▶ を押して、計測を始めよう', tick: () => lab.isRunning() }),
  () => {                                             // 持ち方
    let since = null;
    return {
      html: () => '画面を自分に向けて、縦に両手で持とう📱',
      needsActive: true,
      tick(e) {
        if (!e) return false;
        const g = e.accelerationIncludingGravity;
        if (!g || g.y === null) return false;
        const gy = g.y * IOS_SIGN, gx = g.x * IOS_SIGN, gz = g.z * IOS_SIGN;
        if (gy > 8.8 && gy < 10.8 && Math.abs(gx) < 1.8 && Math.abs(gz) < 1.8) {
          if (since === null) since = performance.now();
          return performance.now() - since > 2000;
        }
        since = null; return false;
      },
    };
  },
  (api) => makeAxisStep(api, TUT_DIRS, 0),
  (api) => makePeakStep(api),
  () => ({ html: () => 'グラフの線から はなれた場所をタップして、拡大してみよう', tick: () => lab.isZoomed() }),
  () => ({ html: () => '⏸ を押して、グラフを止めよう', tick: () => !lab.isRunning() }),
  () => ({ html: () => '線の上をタップして、その点の値を読もう', tick: () => lab.hasMarker() }),
  () => ({ html: () => 'グラフをもう一度タップして、元の大きさに戻そう', tick: () => !lab.isZoomed() }),
];

const MORE_DIRS = [
  { label: '右へ', axis: 'x' }, { label: '左へ', axis: 'x' }, { label: '上へ', axis: 'y' },
  { label: '下へ', axis: 'y' }, { label: '手前に引くと', axis: 'z' }, { label: '奥に押すと', axis: 'z' },
];
const MORE = [
  (api) => makeAxisStep(api, MORE_DIRS),
  (api) => makePeakStep(api),
  () => {                                             // ギザギザ（反転4回）
    const ax = rand(['x', 'y', 'z']); const th = ax === 'z' ? 2 : 2.5;
    let last = 0, count = 0, startAt = null;
    return {
      html: () => ax + ' のグラフに「ギザギザ」を作ろう（山と谷をくりかえす）',
      needsActive: true,
      tick(e) {
        if (!e) return false;
        const l = e.acceleration; if (!l || l.x === null) return false;
        const val = axVal(l, ax), s = val > th ? 1 : (val < -th ? -1 : 0);
        if (s !== 0 && s !== last) { if (last !== 0) count++; last = s; if (startAt === null) startAt = performance.now(); }
        if (startAt !== null && performance.now() - startAt > 4000) { count = 0; last = 0; startAt = null; }
        return count >= 4;
      },
    };
  },
  () => {                                             // だんだん速く（1回グイッでOK）
    const ax = rand(['x', 'y']);
    return {
      html: () => ax + ' の向きに、グイッと速く動かそう',
      needsActive: true,
      tick(e) { if (!e) return false; const l = e.acceleration; if (!l || l.x === null) return false; return Math.abs(axVal(l, ax)) > 3; },
    };
  },
  () => {                                             // 急に動かして止める
    const ax = rand(['x', 'y']); let phase = 0, stopAt = null;
    return {
      html: () => ax + ' の向きに急に動かして、ピタッと止めよう',
      needsActive: true,
      tick(e) {
        if (!e) return false;
        const l = e.acceleration; if (!l || l.x === null) return false;
        const v = Math.abs(axVal(l, ax));
        if (phase === 0 && v > 7) phase = 1;
        else if (phase === 1) {
          if (v < 0.8) { if (stopAt === null) stopAt = performance.now(); if (performance.now() - stopAt > 800) return true; }
          else stopAt = null;
        }
        return false;
      },
    };
  },
];

const tut = createTutorial({
  keyPrefix: 'phylab-acc',
  mountId: 'tutorialMount',
  toggleBtnId: 'missionBtn',
  steps: STEPS,
  moreSteps: MORE,
  completeText: '🎉 チュートリアル完了！グラフの読み方をマスターしたね',
  guessOptions: ['x', 'y', 'z'],
  isActive: () => lab.isRunning(),                    // 動き系ステップは計測中だけ判定
  inactiveNote: '▶ を押して計測を始めてから動かそう',
});

// ▶ を押した直後にも判定（拡大/値読み/⏸ 用の 200ms ポールと合わせる）
document.getElementById('playBtn').addEventListener('click', () => setTimeout(() => tut.tick(null), 50));
setInterval(() => tut.tick(null), 200);
</script>
