<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音響ストップウォッチ | タブレット物理実験ラボ</title>
<style>
  body {
    font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #101820;
    color: #eee;
    margin: 0;
    padding: 16px;
    text-align: center;
  }
  header {
    background: #ffe000; color: #1a1a1a;
    display: flex; align-items: center;
    height: 52px; padding: 0 8px;
    position: sticky; top: 0; z-index: 10;
    margin: -16px -16px 16px;   /* body の padding:16px を打ち消して全幅に */
    text-align: left;
  }
  header a.back { color: #1a1a1a; text-decoration: none; font-size: 1.4rem; padding: 8px 12px; }
  header .title { font-size: 1.1rem; font-weight: bold; flex: 1; }
  header a.dl { color: #1a1a1a; text-decoration: none; font-size: 1.3rem; padding: 8px 12px; }
  header a.back, header a.dl, header button.hbtn { position: relative; z-index: 11; }   /* ヘッダーの操作を最前面に（タップ確実化） */
  header button.hbtn { background: none; border: none; color: #1a1a1a; font-size: 1.5rem; padding: 8px 12px; margin: 0; cursor: pointer; }
  /* 🔰チュートリアルの見た目は tutorial.js（共通エンジン）が持つ */
  h1 { font-size: 1.3rem; margin: 8px 0 16px; }
  #time {
    font-size: 4rem;
    font-variant-numeric: tabular-nums;
    margin: 24px 0;
    letter-spacing: 2px;
  }
  #state {
    font-size: 1.2rem;
    min-height: 1.6rem;
    margin-bottom: 16px;
  }
  .waiting  { color: #fc6; }
  .measuring { color: #6f9; }
  .done { color: #8cf; }
  button {
    font-size: 1.2rem;
    padding: 14px 32px;
    border-radius: 12px;
    border: none;
    background: #4a90d9;
    color: #fff;
    cursor: pointer;
    margin: 4px;
  }
  button.hbtn { padding: 8px 12px; }   /* ヘッダーの🔰は小さく */
  button.stop { background: #d9534f; }
  #level-wrap {
    max-width: 480px;
    margin: 24px auto;
    text-align: left;
  }
  #level-bar {
    height: 20px;
    background: #223;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  #level-fill {
    height: 100%;
    width: 0%;
    background: #6f9;
  }
  #threshold-mark {
    position: absolute;
    top: 0;
    height: 100%;
    width: 2px;
    background: #fc6;
  }
  label { font-size: 0.9rem; color: #9ab; }
  input[type=range] { width: 100%; }
  #err { color: #f88; }
  #history {
    max-width: 480px;
    margin: 16px auto;
    color: #9ab;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">←</a>
  <div class="title">⏱️ 音響ストップウォッチ</div>
  <a class="dl" href="stopwatch.html" download title="このページのHTMLファイルをダウンロード">⬇</a>
  <button id="missionBtn" class="hbtn" title="チュートリアル">🔰</button>
</header>

<div id="tutorialMount"></div>   <!-- 🔰チュートリアルのパネルはここに tutorial.js が差し込む -->

<div id="time">0.00</div>
<div id="state">「開始」を押すと、音を待ちます</div>

<button id="btn">開始（音を待つ）</button>
<button id="reset">リセット</button>

<div id="level-wrap">
  <label>いまの音の大きさ（黄色い線をこえるとスタート／ストップ）</label>
  <div id="level-bar">
    <div id="level-fill"></div>
    <div id="threshold-mark"></div>
  </div>
  <label>反応する大きさ（しきい値）：<span id="th-val"></span></label>
  <input type="range" id="th" min="0.05" max="0.8" step="0.01" value="0.25">
  <label>反響を無視する時間：<span id="echo-val"></span> 秒</label>
  <input type="range" id="echo" min="0" max="3" step="0.1" value="0.3">
</div>

<div id="history"></div>
<p id="err"></p>
<p style="color:#789; font-size:0.85rem;">
  使い方の例：手をパンとたたいてスタート → もう一度たたいてストップ。<br>
  ものが落ちる音、ボールがはずむ音の間かくも測れます。
</p>

<script src="tutorial.js"></script>
<script>
const timeEl = document.getElementById('time');
const stateEl = document.getElementById('state');
const btn = document.getElementById('btn');
const resetBtn = document.getElementById('reset');
const fillEl = document.getElementById('level-fill');
const thMark = document.getElementById('threshold-mark');
const thSlider = document.getElementById('th');
const thVal = document.getElementById('th-val');
const echoSlider = document.getElementById('echo');
const echoVal = document.getElementById('echo-val');
const errEl = document.getElementById('err');
const historyEl = document.getElementById('history');

let audioCtx = null, analyser = null, stream = null;
let mode = 'idle';       // idle | armed | measuring | done
let startTime = 0;       // audioCtx.currentTime ベース（高精度）
let lastTrigger = -10;   // 連続トリガー防止
let results = [];

function echoTime() { return parseFloat(echoSlider.value); }

function updateThUI() {
  thVal.textContent = thSlider.value;
  thMark.style.left = (parseFloat(thSlider.value) * 100) + '%';
}
thSlider.addEventListener('input', updateThUI);
updateThUI();

function updateEchoUI() { echoVal.textContent = echoTime().toFixed(1); }
echoSlider.addEventListener('input', updateEchoUI);
updateEchoUI();

btn.addEventListener('click', async () => {
  if (mode !== 'idle' && mode !== 'done') { setIdle(); return; }
  if (!audioCtx) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: {
        echoCancellation: false, noiseSuppression: false, autoGainControl: false
      }});
    } catch (e) {
      errEl.textContent = 'マイクが使えませんでした：' + e.message;
      return;
    }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    src.connect(analyser);
    loop();
  }
  mode = 'armed';
  lastTrigger = audioCtx.currentTime;
  timeEl.textContent = '0.00';
  stateEl.textContent = '🎤 最初の音を待っています…';
  stateEl.className = 'waiting';
  btn.textContent = '中断';
  btn.classList.add('stop');
  errEl.textContent = '';
  tut.event('armed');
});

resetBtn.addEventListener('click', () => {
  results = [];
  historyEl.textContent = '';
  setIdle();
});

function setIdle() {
  mode = 'idle';
  timeEl.textContent = '0.00';
  stateEl.textContent = '「開始」を押すと、音を待ちます';
  stateEl.className = '';
  btn.textContent = '開始（音を待つ）';
  btn.classList.remove('stop');
}

function loop() {
  requestAnimationFrame(loop);
  if (!analyser) return;

  const data = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(data);
  let peak = 0;
  for (let i = 0; i < data.length; i++) {
    const a = Math.abs(data[i]);
    if (a > peak) peak = a;
  }
  fillEl.style.width = Math.min(peak * 100, 100) + '%';
  fillEl.style.background = peak >= parseFloat(thSlider.value) ? '#fc6' : '#6f9';

  const now = audioCtx.currentTime;
  const triggered = peak >= parseFloat(thSlider.value) && (now - lastTrigger) > echoTime();

  if (triggered && mode === 'armed') {
    lastTrigger = now;
    startTime = now;
    mode = 'measuring';
    stateEl.textContent = '⏱️ 計測中… 次の音で止まります';
    stateEl.className = 'measuring';
    tut.event('measuring');
  } else if (triggered && mode === 'measuring') {
    lastTrigger = now;
    const elapsed = now - startTime;
    mode = 'done';
    timeEl.textContent = elapsed.toFixed(2);
    stateEl.textContent = '✅ 計測しました（もう一度「開始」で再計測）';
    stateEl.className = 'done';
    btn.textContent = '開始（音を待つ）';
    btn.classList.remove('stop');
    results.push(elapsed);
    historyEl.innerHTML = '記録：' + results.map(r => r.toFixed(2) + ' 秒').join('、 ');
    tut.event('done', elapsed);
  }

  if (mode === 'measuring') {
    timeEl.textContent = (now - startTime).toFixed(2);
  }
}

// ---- チュートリアルのステップ定義（判定だけ。器は tutorial.js） ----
// 範囲当て課題（lo〜hi秒で止める）。秒は上の大きな数字に出るので、ヒントは方向だけ。
function rangeStep(lo, hi) {
  return {
    html: () => lo + '〜' + hi + '秒の間で止めてみよう',
    on: 'done',
    check: (el) => el >= lo && el <= hi,
    fail: (el) => (el < lo ? 'もう少し長く' : 'もう少し短く'),
  };
}
const RANGE_POOL = [[5,8],[3,5],[6,8],[2,4],[4,6],[7,9],[1,3],[8,10]];   // 幅は必ず1秒以上
const rand = (a) => a[Math.floor(Math.random() * a.length)];

// マイク許可ダイアログの案内。文言はOS・ブラウザ・バージョンで違うため、
// 「許可」の字が入るボタンを押す、という版に依存しない言い方にする。
function micHint() {
  const ua = navigator.userAgent;
  const isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (isIOS) return '（「マイクの使用を求めています」と出たら「許可」して下さい）';
  if (/Android/.test(ua)) return '（マイクを使ってもいい？と聞かれたら「許可」して下さい）';
  return '（マイクを使ってもいい？と聞かれたら「許可」して下さい）';
}

const STEPS = [
  () => ({ html: () => '「開始」を押して、音を待とう' + micHint(), on: 'armed' }),
  () => ({ html: () => '手をパンとたたいて、タイマーをスタート', on: 'measuring' }),
  () => ({ html: () => 'タイマーが動いているのを見てみよう', observe: true }),
  () => ({ html: () => 'もう一度たたいて、タイマーを止めよう', on: 'done' }),
  () => ({ html: () => 'タイマーが止まったのを見てみよう', observe: true }),
  () => rangeStep(5, 8),
];
const MORE = [ () => { const r = rand(RANGE_POOL); return rangeStep(r[0], r[1]); } ];

const tut = createTutorial({
  keyPrefix: 'phylab-sw',
  mountId: 'tutorialMount',
  toggleBtnId: 'missionBtn',
  steps: STEPS,
  moreSteps: MORE,
  completeText: '🎉 チュートリアル完了！時間の測り方をマスターしたね',
});
</script>
</body>
</html>
