<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>タブレット物理実験ラボ</title>
<style>
  :root { --phx-orange: #ffe000; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #1a1a1a;
    color: #eee;
    margin: 0;
  }
  header {
    background: var(--phx-orange);
    color: #1a1a1a;
    display: flex;
    align-items: center;
    height: 52px;
    padding: 0 16px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header .title { font-size: 1.2rem; font-weight: bold; }
  main { max-width: 640px; margin: 0 auto; padding: 8px 0 24px; }
  h2 {
    font-size: 0.85rem;
    color: var(--phx-orange);
    margin: 20px 16px 6px;
    border-bottom: 1px solid #333;
    padding-bottom: 4px;
  }
  a.item, div.item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 16px;
    text-decoration: none;
    color: inherit;
  }
  a.item:active { background: #2a2a2a; }
  .icon {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--phx-orange);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  .item .name { font-size: 1rem; }
  .item .desc { font-size: 0.78rem; color: #999; }
  div.item.disabled { opacity: 0.45; }
  div.item.disabled .icon { background: #555; }
  .note {
    margin: 20px 16px;
    font-size: 0.75rem;
    color: #789;
    text-align: center;
  }
</style>
</head>
<body>
<header><div class="title">🔬 タブレット物理実験ラボ</div></header>

<main>
  <div class="item disabled">
    <div class="icon">🙋</div>
    <div><div class="name">回答カウンター</div>
    <div class="desc">🚧 工事中</div></div>
  </div>
  <a class="item" href="acceleration.html">
    <div class="icon">📈</div>
    <div><div class="name">加速度</div>
    <div class="desc">ふってみよう！グラフがビヨン</div></div>
  </a>
  <a class="item" href="stopwatch.html">
    <div class="icon">⏱️</div>
    <div><div class="name">音響ストップウォッチ</div>
    <div class="desc">パン！ではかる、音のストップウォッチ</div></div>
  </a>
  <a class="item" href="location.html">
    <div class="icon">📍</div>
    <div><div class="name">位置（GPS）</div>
    <div class="desc">電車・バスの中が実験室になる</div></div>
  </a>
  <!-- 非表示中（ページ自体は残してある。URLを直接開けば使える）
  <a class="item" href="gyroscope.html">
    <div class="icon">🌀</div>
    <div><div class="name">ジャイロスコープ</div>
    <div class="desc">回転の速さ（°/s）をX/Y/Z軸で記録</div></div>
  </a>
  <a class="item" href="magnetometer.html">
    <div class="icon">🧲</div>
    <div><div class="name">磁気センサー（3軸）</div>
    <div class="desc">磁場の強さ（µT）をX/Y/Z軸で記録 ※非対応の端末はコンパスへ</div></div>
  </a>
  <a class="item" href="compass.html">
    <div class="icon">🧭</div>
    <div><div class="name">コンパス</div>
    <div class="desc">方位を表示。磁石を近づける実験も</div></div>
  </a>
  <a class="item" href="sound.html">
    <div class="icon">🎵</div>
    <div><div class="name">音のスペクトル</div>
    <div class="desc">マイクで音をひろって周波数ごとの強さを表示</div></div>
  </a>
  -->

</main>
</body>
</html>
