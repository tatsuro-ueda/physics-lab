<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>加速度 | 理科実験ラボ</title>
<style>
  :root { --phx-orange: #ffe000; --ax-x: #ff9500; --ax-y: #d4c400; --ax-z: #e04040; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #1a1a1a;
    color: #eee;
    margin: 0;
  }
  header {
    background: var(--phx-orange);
    color: #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 8px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header a.back {
    color: #1a1a1a; text-decoration: none;
    font-size: 1.4rem; padding: 8px 12px;
  }
  header .title { font-size: 1.1rem; font-weight: bold; flex: 1; }
  header button {
    background: none; border: none; color: #1a1a1a;
    font-size: 1.5rem; padding: 8px 12px; cursor: pointer;
  }
  main { max-width: 760px; margin: 0 auto; padding: 8px; }
  .card {
    margin-bottom: 10px;
    border: 1px solid #333;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
  }
  .card .head {
    background: #2b2b2b;
    text-align: center;
    font-size: 0.9rem;
    display: flex;
    justify-content: space-between;
    padding: 5px 10px;
  }
  .card .val { font-variant-numeric: tabular-nums; color: #bbb; }
  .card canvas { display: block; width: 100%; height: 150px; background: #000; }
  /* 拡大表示 */
  body.zoom .card { display: none; }
  body.zoom .card.zoomed { display: block; }
  body.zoom .card.zoomed canvas { height: 60vh; }
  body.zoom .card.zoomed .head { font-size: 1.1rem; }
  .hint { text-align: center; color: #888; font-size: 0.8rem; margin: 12px 0; }
  .controls { text-align: center; margin: 8px 0; color: #aaa; font-size: 0.9rem; }
  #err { color: #f88; text-align: center; }
</style>
</head>
<body>
<header>
  <a class="back" href="index.html" id="backLink">←</a>
  <div class="title">加速度</div>
  <button id="playBtn" title="計測開始">▶</button>
  <button id="resetBtn" title="計測を止めてデータを消す">🗑</button>
</header>

<main>
  <div class="controls">
    <label><input type="checkbox" id="gravity" checked> 重力をふくめる</label>
    　単位：m/s²　横じく：経過時間（秒）
  </div>

  <div class="card" id="card-x">
    <div class="head"><span style="color:var(--ax-x)">加速度 X</span><span class="val" id="val-x">--</span></div>
    <canvas id="cv-x" width="720" height="300"></canvas>
  </div>
  <div class="card" id="card-y">
    <div class="head"><span style="color:var(--ax-y)">加速度 Y</span><span class="val" id="val-y">--</span></div>
    <canvas id="cv-y" width="720" height="300"></canvas>
  </div>
  <div class="card" id="card-z">
    <div class="head"><span style="color:var(--ax-z)">加速度 Z</span><span class="val" id="val-z">--</span></div>
    <canvas id="cv-z" width="720" height="300"></canvas>
  </div>

  <p id="err"></p>
  <p class="hint" id="hint">▶ で計測開始。<b>線の上をタップ</b>するとその点の値、<b>線から離れた場所をタップ</b>すると拡大・縮小します（⏸ で止めると読みやすい）。</p>
</main>

<script>
const AXES = ['x', 'y', 'z'];
const COLORS = { x: '#ff9500', y: '#d4c400', z: '#e04040' };
const buf = { x: [], y: [], z: [] };   // 値（全履歴を保持）
const tbuf = [];                        // 経過時間（秒）。phyphox同様、時間軸を圧縮して全体を表示する
const MAX_SAMPLES = 150000;             // 安全上限（約40分ぶん）
let t0 = null;                          // 計測起点
let running = false;
let listening = false;
let gotData = false;

const playBtn = document.getElementById('playBtn');
const errEl = document.getElementById('err');
const gravityCheck = document.getElementById('gravity');

// ---- タップ操作：線の近く→値を表示／それ以外→拡大・縮小 ----
const marker = { x: null, y: null, z: null };
const PAD_MIN = 0.5;      // drawGraphの余白と同じ値（座標計算を一致させる）
const HIT_PX = 30;        // 「線の上」とみなす距離（canvas座標）

function toggleZoom(card) {
  if (document.body.classList.contains('zoom')) {
    document.body.classList.remove('zoom');
    card.classList.remove('zoomed');
  } else {
    document.body.classList.add('zoom');
    card.classList.add('zoomed');
  }
}

function timeSpan() {
  return Math.max(tbuf.length ? tbuf[tbuf.length - 1] : 0, 2);
}

// タップ位置の時刻に一番近いサンプルを探す（サンプリングほぼ等間隔なので近傍探索で十分）
function nearestIndex(targetT) {
  const len = tbuf.length;
  let i = Math.min(Math.max(Math.round(targetT / timeSpan() * (len - 1)), 0), len - 1);
  for (let j = Math.max(0, i - 30); j < Math.min(len, i + 30); j++) {
    if (Math.abs(tbuf[j] - targetT) < Math.abs(tbuf[i] - targetT)) i = j;
  }
  return i;
}

AXES.forEach(ax => {
  const card = document.getElementById('card-' + ax);
  card.querySelector('.head').addEventListener('click', () => toggleZoom(card));
  const cvEl = document.getElementById('cv-' + ax);
  cvEl.addEventListener('click', (ev) => {
    const rect = cvEl.getBoundingClientRect();
    const cx = (ev.clientX - rect.left) / rect.width * cvEl.width;
    const cy = (ev.clientY - rect.top) / rect.height * cvEl.height;
    const arr = buf[ax];
    if (arr.length >= 2) {
      let min = Math.min(...arr), max = Math.max(...arr);
      const pad = Math.max((max - min) * 0.15, PAD_MIN);
      min -= pad; max += pad;
      const i = nearestIndex(cx / cvEl.width * timeSpan());
      const ly = cvEl.height - ((arr[i] - min) / (max - min)) * cvEl.height;
      if (Math.abs(cy - ly) < HIT_PX) { marker[ax] = i; return; }   // 線の上→値
    }
    toggleZoom(card);                                                // 線の外→拡大/縮小
  });
});

// ---- 計測 ----
playBtn.addEventListener('click', async () => {
  if (running) {                    // 一時停止
    running = false;
    playBtn.textContent = '▶';
    return;
  }
  if (!listening) {
    // iOS 13+ は明示的な許可が必要
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      try {
        const res = await DeviceMotionEvent.requestPermission();
        if (res !== 'granted') { errEl.textContent = 'センサーの使用が許可されませんでした'; return; }
      } catch (e) {
        errEl.textContent = '許可の取得に失敗：' + e.message; return;
      }
    }
    window.addEventListener('devicemotion', onMotion);
    listening = true;
    setTimeout(() => {
      if (!gotData) errEl.textContent = 'この端末では加速度センサーのデータが取れないようです（センサー非搭載の可能性）';
    }, 3000);
    draw();
  }
  // 再開時：ポーズしていた時間を除いて時間軸を連続させる
  if (tbuf.length) t0 = performance.now() / 1000 - tbuf[tbuf.length - 1];
  AXES.forEach(ax => marker[ax] = null);   // 再開時はタップ値の表示を消す
  running = true;
  errEl.textContent = '';
  playBtn.textContent = '⏸';
});

function onMotion(e) {
  if (!running) return;
  const a = gravityCheck.checked ? e.accelerationIncludingGravity : e.acceleration;
  if (!a || a.x === null) return;
  gotData = true;
  const now = performance.now() / 1000;
  if (t0 === null) t0 = now;
  tbuf.push(now - t0);
  buf.x.push(a.x); buf.y.push(a.y); buf.z.push(a.z);
  AXES.forEach(ax => {
    document.getElementById('val-' + ax).textContent =
      buf[ax][buf[ax].length - 1].toFixed(2) + ' m/s²';
  });
  if (tbuf.length > MAX_SAMPLES) {
    running = false;
    playBtn.textContent = '▶';
    errEl.textContent = '記録が長くなったので自動停止しました（🗑 で消去できます）';
  }
}

// ---- リセット：計測を止めてデータを消す ----
document.getElementById('resetBtn').addEventListener('click', () => {
  running = false;
  playBtn.textContent = '▶';
  t0 = null;
  tbuf.length = 0;
  AXES.forEach(ax => {
    buf[ax].length = 0;
    marker[ax] = null;
    document.getElementById('val-' + ax).textContent = '--';
    const c = document.getElementById('cv-' + ax);
    c.getContext('2d').clearRect(0, 0, c.width, c.height);
  });
});

// ---- 描画（phyphox方式：時間軸を圧縮して全履歴を表示） ----
function draw() {
  requestAnimationFrame(draw);
  AXES.forEach(ax => drawGraph(
    document.getElementById('cv-' + ax), buf[ax], COLORS[ax], marker[ax]));
}

// 時間軸の目もり幅を選ぶ（画面内に2〜8本になるように）
function pickTimeStep(span) {
  const steps = [0.5, 1, 2, 5, 10, 15, 30, 60, 120, 300, 600];
  for (const s of steps) if (span / s <= 8) return s;
  return 1200;
}

function drawGraph(cv, arr, color, mIdx) {
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  if (arr.length < 2) return;

  const span = timeSpan();

  // 縦の自動スケール（データに合わせて伸縮）
  let min = Math.min(...arr), max = Math.max(...arr);
  const pad = Math.max((max - min) * 0.15, PAD_MIN);
  min -= pad; max += pad;
  const toX = t => (t / span) * W;
  const toY = v => H - ((v - min) / (max - min)) * H;

  // 横グリッド（値）
  ctx.strokeStyle = '#2a2a2a';
  ctx.fillStyle = '#888';
  ctx.font = '13px sans-serif';
  for (let i = 0; i <= 4; i++) {
    const v = min + (max - min) * i / 4;
    const y = toY(v);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.fillText(v.toFixed(1), 6, Math.min(Math.max(y - 4, 14), H - 4));
  }
  // 縦グリッド（時間）
  const tStep = pickTimeStep(span);
  for (let t = tStep; t < span; t += tStep) {
    const x = toX(t);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    ctx.fillText((tStep < 1 ? t.toFixed(1) : Math.round(t)) + 's', x + 4, H - 6);
  }
  // ゼロ線を強調
  if (min < 0 && max > 0) {
    const y0 = toY(0);
    ctx.strokeStyle = '#555';
    ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(W, y0); ctx.stroke();
  }

  // データ線（サンプルが多いときは間引いて描く）
  const len = arr.length;
  const stride = Math.max(1, Math.floor(len / W));
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(toX(tbuf[0]), toY(arr[0]));
  for (let i = stride; i < len; i += stride) {
    ctx.lineTo(toX(tbuf[i]), toY(arr[i]));
  }
  ctx.lineTo(toX(tbuf[len - 1]), toY(arr[len - 1]));
  ctx.stroke();

  // タップした点の値（有効数字2桁）
  if (mIdx !== null && mIdx < len) {
    const x = toX(tbuf[mIdx]);
    const y = toY(arr[mIdx]);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();
    const label = Number(arr[mIdx].toPrecision(2)).toString();
    ctx.font = 'bold 16px sans-serif';
    const tw = ctx.measureText(label).width;
    const lx = Math.min(Math.max(x - tw / 2, 4), W - tw - 4);
    const ly = y > 34 ? y - 14 : y + 28;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(lx - 4, ly - 16, tw + 8, 22);
    ctx.fillStyle = '#fff';
    ctx.fillText(label, lx, ly);
  }
}
</script>
</body>
</html>
