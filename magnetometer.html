<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>磁気センサー（3軸） | 理科実験ラボ</title>
<style>
  :root { --phx-orange: #ffb300; --ax-x: #ff9500; --ax-y: #d4c400; --ax-z: #e04040; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #1a1a1a;
    color: #eee;
    margin: 0;
  }
  header {
    background: var(--phx-orange);
    color: #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 8px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header a.back {
    color: #1a1a1a; text-decoration: none;
    font-size: 1.4rem; padding: 8px 12px;
  }
  header .title { font-size: 1.1rem; font-weight: bold; flex: 1; }
  header button {
    background: none; border: none; color: #1a1a1a;
    font-size: 1.5rem; padding: 8px 12px; cursor: pointer;
  }
  main { max-width: 760px; margin: 0 auto; padding: 8px; }
  .card {
    margin-bottom: 10px;
    border: 1px solid #333;
    border-radius: 4px;
    overflow: hidden;
    cursor: pointer;
  }
  .card .head {
    background: #2b2b2b;
    text-align: center;
    font-size: 0.9rem;
    display: flex;
    justify-content: space-between;
    padding: 5px 10px;
  }
  .card .val { font-variant-numeric: tabular-nums; color: #bbb; }
  .card canvas { display: block; width: 100%; height: 150px; background: #000; }
  body.zoom .card { display: none; }
  body.zoom .card.zoomed { display: block; }
  body.zoom .card.zoomed canvas { height: 60vh; }
  body.zoom .card.zoomed .head { font-size: 1.1rem; }
  .hint { text-align: center; color: #888; font-size: 0.8rem; margin: 12px 0; }
  .controls { text-align: center; margin: 8px 0; color: #aaa; font-size: 0.9rem; }
  #err { color: #f88; text-align: center; }
  #err a { color: #ffb300; }
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">←</a>
  <div class="title">磁気センサー（3軸）</div>
  <button id="playBtn" title="計測開始">▶</button>
  <button id="resetBtn" title="データを消す">🗑</button>
</header>

<main>
  <div class="controls">単位：µT（マイクロテスラ）。磁石を近づけると値が大きく変わります</div>

  <div class="card" id="card-x">
    <div class="head"><span style="color:var(--ax-x)">磁場 X</span><span class="val" id="val-x">--</span></div>
    <canvas id="cv-x" width="720" height="300"></canvas>
  </div>
  <div class="card" id="card-y">
    <div class="head"><span style="color:var(--ax-y)">磁場 Y</span><span class="val" id="val-y">--</span></div>
    <canvas id="cv-y" width="720" height="300"></canvas>
  </div>
  <div class="card" id="card-z">
    <div class="head"><span style="color:var(--ax-z)">磁場 Z</span><span class="val" id="val-z">--</span></div>
    <canvas id="cv-z" width="720" height="300"></canvas>
  </div>

  <p id="err"></p>
  <p class="hint" id="hint">▶ で計測開始。<b>見出しをタップ</b>すると拡大、<b>グラフ上をタップ</b>するとその点の値が出ます（⏸ で止めると読みやすい）。</p>
</main>

<script>
const AXES = ['x', 'y', 'z'];
const COLORS = { x: '#ff9500', y: '#d4c400', z: '#e04040' };
const N = 400;
const buf = { x: [], y: [], z: [] };
let running = false;
let sensor = null;
let gotData = false;

const playBtn = document.getElementById('playBtn');
const errEl = document.getElementById('err');

const UNSUPPORTED_MSG =
  'この端末のブラウザは磁気センサーの生データ（3軸）に対応していません。' +
  'iPad Safariは非対応、Chromeも標準では無効です。' +
  '方位だけなら <a href="compass.html">コンパス</a> で見られます。';

const marker = { x: null, y: null, z: null };
AXES.forEach(ax => {
  const card = document.getElementById('card-' + ax);
  card.querySelector('.head').addEventListener('click', () => {
    if (document.body.classList.contains('zoom')) {
      document.body.classList.remove('zoom');
      card.classList.remove('zoomed');
    } else {
      document.body.classList.add('zoom');
      card.classList.add('zoomed');
    }
  });
  const cvEl = document.getElementById('cv-' + ax);
  cvEl.addEventListener('click', (ev) => {
    const rect = cvEl.getBoundingClientRect();
    marker[ax] = Math.round((ev.clientX - rect.left) / rect.width * (N - 1));
  });
});

playBtn.addEventListener('click', () => {
  if (running) {
    running = false;
    playBtn.textContent = '▶';
    return;
  }
  if (!sensor) {
    // Generic Sensor API（Chrome系のみ・多くはフラグ必須）
    if (typeof Magnetometer === 'undefined') {
      errEl.innerHTML = UNSUPPORTED_MSG;
      return;
    }
    try {
      sensor = new Magnetometer({ frequency: 10 });
      sensor.addEventListener('reading', () => {
        if (!running) return;
        gotData = true;
        push('x', sensor.x); push('y', sensor.y); push('z', sensor.z);
        AXES.forEach(ax => {
          document.getElementById('val-' + ax).textContent =
            buf[ax][buf[ax].length - 1].toFixed(2) + ' µT';
        });
      });
      sensor.addEventListener('error', (e) => {
        errEl.innerHTML = 'センサーにアクセスできませんでした（' + e.error.name + '）。' + UNSUPPORTED_MSG;
      });
      sensor.start();
    } catch (e) {
      errEl.innerHTML = '開始に失敗：' + e.message + '。' + UNSUPPORTED_MSG;
      sensor = null;
      return;
    }
    setTimeout(() => {
      if (!gotData) errEl.innerHTML = 'データが来ません。' + UNSUPPORTED_MSG;
    }, 3000);
    draw();
  }
  running = true;
  errEl.textContent = '';
  playBtn.textContent = '⏸';
});

// ---- リセット（phyphoxの🗑と同様：データだけ消す。計測の開始/停止状態は変えない） ----
document.getElementById('resetBtn').addEventListener('click', () => {
  AXES.forEach(ax => {
    buf[ax].length = 0;
    marker[ax] = null;
    document.getElementById('val-' + ax).textContent = '--';
    const c = document.getElementById('cv-' + ax);
    c.getContext('2d').clearRect(0, 0, c.width, c.height);
  });
});

function push(ax, v) {
  buf[ax].push(v);
  if (buf[ax].length > N) buf[ax].shift();
}

function draw() {
  requestAnimationFrame(draw);
  AXES.forEach(ax => drawGraph(
    document.getElementById('cv-' + ax), buf[ax], COLORS[ax], marker[ax]));
}

function drawGraph(cv, arr, color, mIdx) {
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  if (arr.length < 2) return;

  let min = Math.min(...arr), max = Math.max(...arr);
  const pad = Math.max((max - min) * 0.15, 2);
  min -= pad; max += pad;

  ctx.strokeStyle = '#2a2a2a';
  ctx.fillStyle = '#888';
  ctx.font = '13px sans-serif';
  const steps = 4;
  for (let i = 0; i <= steps; i++) {
    const v = min + (max - min) * i / steps;
    const y = H - ((v - min) / (max - min)) * H;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.fillText(v.toFixed(1), 6, Math.min(Math.max(y - 4, 14), H - 4));
  }
  if (min < 0 && max > 0) {
    const y0 = H - ((0 - min) / (max - min)) * H;
    ctx.strokeStyle = '#555';
    ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(W, y0); ctx.stroke();
  }

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < arr.length; i++) {
    const x = (i / (N - 1)) * W;
    const y = H - ((arr[i] - min) / (max - min)) * H;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // タップした点の値（小数2桁）
  if (mIdx !== null) {
    const i = Math.min(mIdx, arr.length - 1);
    const x = (i / (N - 1)) * W;
    const y = H - ((arr[i] - min) / (max - min)) * H;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();
    const label = arr[i].toFixed(2);
    ctx.font = 'bold 16px sans-serif';
    const tw = ctx.measureText(label).width;
    const lx = Math.min(Math.max(x - tw / 2, 4), W - tw - 4);
    const ly = y > 34 ? y - 14 : y + 28;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(lx - 4, ly - 16, tw + 8, 22);
    ctx.fillStyle = '#fff';
    ctx.fillText(label, lx, ly);
  }
}
</script>
</body>
</html>
