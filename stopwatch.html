<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音響ストップウォッチ | タブレット物理実験ラボ</title>
<style>
  body {
    font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #101820;
    color: #eee;
    margin: 0;
    padding: 16px;
    text-align: center;
  }
  header {
    background: #ffe000; color: #1a1a1a;
    display: flex; align-items: center;
    height: 52px; padding: 0 8px;
    position: sticky; top: 0; z-index: 10;
    margin: -16px -16px 16px;   /* body の padding:16px を打ち消して全幅に */
    text-align: left;
  }
  header a.back { color: #1a1a1a; text-decoration: none; font-size: 1.4rem; padding: 8px 12px; }
  header .title { font-size: 1.1rem; font-weight: bold; flex: 1; }
  header a.dl { color: #1a1a1a; text-decoration: none; font-size: 1.3rem; padding: 8px 12px; }
  header a.back, header a.dl, header button.hbtn { position: relative; z-index: 11; }   /* ヘッダーの操作を最前面に（タップ確実化） */
  header button.hbtn { background: none; border: none; color: #1a1a1a; font-size: 1.5rem; padding: 8px 12px; margin: 0; cursor: pointer; }
  /* 🔰チュートリアルの見た目は tutorial.js（共通エンジン）が持つ */
  h1 { font-size: 1.3rem; margin: 8px 0 16px; }
  #time {
    font-size: 4rem;
    font-variant-numeric: tabular-nums;
    margin: 24px 0;
    letter-spacing: 2px;
  }
  #state {
    font-size: 1.2rem;
    min-height: 1.6rem;
    margin-bottom: 16px;
  }
  .waiting  { color: #fc6; }
  .measuring { color: #6f9; }
  .done { color: #8cf; }
  button {
    font-size: 1.2rem;
    padding: 14px 32px;
    border-radius: 12px;
    border: none;
    background: #4a90d9;
    color: #fff;
    cursor: pointer;
    margin: 4px;
  }
  button.hbtn { padding: 8px 12px; }   /* ヘッダーの🔰は小さく */
  button.stop { background: #d9534f; }
  #level-wrap {
    max-width: 480px;
    margin: 24px auto;
    text-align: left;
  }
  #level-bar {
    height: 20px;
    background: #223;
    border-radius: 10px;
    overflow: hidden;
    position: relative;
  }
  #level-fill {
    height: 100%;
    width: 0%;
    background: #6f9;
  }
  #threshold-mark {
    position: absolute;
    top: 0;
    height: 100%;
    width: 2px;
    background: #fc6;
  }
  label { font-size: 0.9rem; color: #9ab; }
  input[type=range] { width: 100%; }
  #err { color: #f88; }
  #history {
    max-width: 480px;
    margin: 16px auto;
    color: #9ab;
    font-variant-numeric: tabular-nums;
  }
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">←</a>
  <div class="title">⏱️ 音響ストップウォッチ</div>
  <button id="missionBtn" class="hbtn" title="チュートリアル">🔰</button>
</header>

<div id="tutorialMount"></div>   <!-- 🔰チュートリアルのパネルはここに tutorial.js が差し込む -->

<div id="time">0.00</div>
<div id="state">「開始」を押すと、音を待ちます</div>

<button id="btn">開始（音を待つ）</button>
<button id="reset">リセット</button>

<div id="level-wrap">
  <label>いまの音の大きさ（黄色い線をこえたら反応）</label>
  <div id="level-bar">
    <div id="level-fill"></div>
    <div id="threshold-mark"></div>
  </div>
  <label>反応する大きさ（しきい値）：<span id="th-val"></span></label>
  <input type="range" id="th" min="0.05" max="0.8" step="0.01" value="0.25">
  <label>反響を無視する時間：<span id="echo-val"></span> 秒</label>
  <input type="range" id="echo" min="0" max="3" step="0.1" value="0.3">
</div>

<div id="history"></div>
<p id="err"></p>
<p style="color:#789; font-size:0.85rem;">
  たたくたびに止まる・動くをくり返す（音速の測定、落ちる音・はずむ音の間かくなど）
</p>

<script>
// ============================================================
// 🔰チュートリアル共通エンジン（正本はこのファイル1つ）
// ------------------------------------------------------------
// 進捗ドット・「あと◯つ」・完了/もっとやる・localStorage・🔰トグル・
// 見た目(CSS)・パネルDOM を全部ここが持つ。加速度・音響SW など各ページは
// createTutorial({...}) を1回呼び、ステップ定義と入力の与え方だけ書く。
//
// 入力の与え方（どちらでも可・併用可）:
//   tut.tick(e)          … 動き駆動（毎フレーム呼ぶ。加速度の devicemotion）
//   tut.event(name, data)… イベント駆動（音響SWの armed/measuring/done）
//
// ステップ定義（factory は api を受け取り、ステップ実体を返す）:
//   (api) => ({
//     html: () => '文言',
//     tick?: (e)=>bool,          // 動き駆動でクリア判定（true でクリア）
//     needsActive?: true,        // 計測中(cfg.isActive)のときだけ tick する
//     on?: 'done', check?, fail?,// イベント駆動。check偽なら api.note(fail(data))
//     observe?: true,            // 「見えた！つぎへ」ボタンで進むステップ
//     guess?: true, onGuess?:(g)=>void,  // 予想ボタン（cfg.guessOptions 必須）
//   })
//   api = { note(t), markGuess(g), setQuestion(t), isActive() }
// ============================================================
(function () {
  const CSS = `
  .missions { max-width: 760px; margin: 0 auto 10px; background:#22261c; border:1px solid #4a5334; border-radius:6px; padding:10px 14px; font-size:0.95rem; text-align:left; }
  .m-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .m-head .m-title { color:#a8c26a; font-weight:bold; }
  .m-dots { letter-spacing:3px; font-size:0.9rem; color:#4a5334; }
  .m-dots .on { color:#ffe000; } .m-dots .now { color:#a8c26a; } .m-dots .m-remain { color:#a8c26a; font-size:0.8rem; }
  .m-body { color:#eee; padding:4px 0; min-height:1.5rem; }
  .m-body.cleared { animation:m-flash 0.9s; }
  @keyframes m-flash { 0%{background:#4a5334;} 100%{background:transparent;} }
  .m-guess { margin-top:8px; }
  .m-guess button { background:#333; color:#eee; border:1px solid #555; border-radius:6px; padding:5px 16px; margin:0 3px; cursor:pointer; font-size:0.95rem; }
  .m-guess button.picked { background:#ffe000; color:#1a1a1a; border-color:#ffe000; }
  .m-next { background:#ffe000; color:#1a1a1a; border:none; border-radius:6px; padding:6px 18px; margin-top:8px; cursor:pointer; font-size:0.95rem; }
  .m-note { color:#e8a56a; margin-top:6px; font-size:0.85rem; min-height:1rem; }
  .m-done-btns { text-align:right; margin-top:8px; }
  .m-done-btns button { background:#333; color:#eee; border:1px solid #555; border-radius:6px; padding:6px 18px; margin-left:8px; cursor:pointer; font-size:0.95rem; }
  .m-done-btns button.m-more { background:#ffe000; color:#1a1a1a; border-color:#ffe000; }
  .tut-pulse { animation:m-pulse 1.1s ease-in-out 4; }
  @keyframes m-pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.35);} }
  `;
  const PANEL =
    '<div class="missions" hidden>' +
    '<div class="m-head"><span class="m-title">🔰 チュートリアル</span><span class="m-dots"></span></div>' +
    '<div class="m-body"></div>' +
    '<div class="m-guess" hidden></div>' +
    '<button class="m-next" hidden>見えた！つぎへ</button>' +
    '<div class="m-note"></div>' +
    '<div class="m-done-btns" hidden>' +
    '<button class="m-restart">最初から</button>' +
    '<button class="m-more">もっとやる</button>' +
    '<button class="m-close">閉じる</button>' +
    '</div></div>';

  window.createTutorial = function (cfg) {
    // cfg: { keyPrefix, mountId, toggleBtnId, steps[], moreSteps[]?, completeText?,
    //        guessOptions?, isActive?, inactiveNote? }
    if (!document.getElementById('tutorial-css')) {
      const st = document.createElement('style');
      st.id = 'tutorial-css'; st.textContent = CSS;
      document.head.appendChild(st);
    }
    const mount = document.getElementById(cfg.mountId);
    mount.innerHTML = PANEL;
    const panel = mount.querySelector('.missions');
    const mDots = panel.querySelector('.m-dots');
    const mBody = panel.querySelector('.m-body');
    const mGuess = panel.querySelector('.m-guess');
    const mNext = panel.querySelector('.m-next');
    const mNote = panel.querySelector('.m-note');
    const mDoneBtns = panel.querySelector('.m-done-btns');
    const mRestart = panel.querySelector('.m-restart');
    const mMore = panel.querySelector('.m-more');
    const mClose = panel.querySelector('.m-close');
    const toggleBtn = document.getElementById(cfg.toggleBtnId);

    const M_KEY = cfg.keyPrefix + '-step';
    const SEEN_KEY = cfg.keyPrefix + '-seen';
    const hasMore = cfg.moreSteps && cfg.moreSteps.length > 0;
    const rand = (a) => a[Math.floor(Math.random() * a.length)];

    if (cfg.guessOptions) {
      mGuess.innerHTML = '予想：' +
        cfg.guessOptions.map(g => '<button data-g="' + g + '">' + g + '</button>').join('');
    }
    function markGuess(picked) {
      mGuess.querySelectorAll('button').forEach(b => b.classList.toggle('picked', b.dataset.g === picked));
    }

    // ステップに渡す小さなAPI（DOMを直接触らせない）
    const api = {
      note: (t) => { mNote.textContent = t; },
      markGuess,
      setQuestion: (t) => { mBody.innerHTML = prefix() + t; },
      isActive: () => (cfg.isActive ? cfg.isActive() : true),
    };

    let mode = 'tutorial';
    let current = null;
    let stepIndex = 0;
    try { stepIndex = Math.max(0, Math.min(cfg.steps.length, parseInt(localStorage.getItem(M_KEY) || '0', 10))); } catch (e) {}
    function save() { try { localStorage.setItem(M_KEY, String(stepIndex)); } catch (e) {} }
    function prefix() { return mode === 'tutorial' ? '(' + (stepIndex + 1) + ') ' : '🔁 '; }

    function renderDots() {
      if (mode !== 'tutorial') { mDots.innerHTML = ''; return; }
      let s = '';
      for (let i = 0; i < cfg.steps.length; i++) {
        const cls = i < stepIndex ? 'on' : (i === stepIndex ? 'now' : '');
        s += '<span class="' + cls + '">●</span>';
      }
      const remain = cfg.steps.length - stepIndex;
      mDots.innerHTML = s + (remain > 0 ? ' <span class="m-remain">あと' + remain + 'つ</span>' : '');
    }

    function showComplete() {
      current = null; renderDots();
      mBody.innerHTML = cfg.completeText || '🎉 チュートリアル完了！';
      mNote.textContent = ''; mGuess.hidden = true; mNext.hidden = true;
      mDoneBtns.hidden = false; mRestart.hidden = false; mClose.hidden = false; mMore.hidden = !hasMore;
      toggleBtn.innerHTML = '🔰✅';
    }

    function load() {
      mNote.textContent = ''; markGuess(null);
      mNext.hidden = true; mDoneBtns.hidden = true; mGuess.hidden = true;
      if (mode === 'tutorial') {
        renderDots();
        if (stepIndex >= cfg.steps.length) { showComplete(); return; }
        current = cfg.steps[stepIndex](api);
        toggleBtn.innerHTML = '🔰';
      } else {
        mDots.innerHTML = '';
        current = rand(cfg.moreSteps)(api);
        mDoneBtns.hidden = false; mRestart.hidden = false; mClose.hidden = false; mMore.hidden = true;
      }
      mBody.innerHTML = prefix() + current.html();
      if (current.guess) mGuess.hidden = false;
      if (current.observe) mNext.hidden = false;
    }

    function clear() {
      mBody.classList.remove('cleared'); void mBody.offsetWidth; mBody.classList.add('cleared');
      current = null;
      if (mode === 'tutorial') { stepIndex++; save(); }
      setTimeout(load, 900);
    }

    // 入力: 動き駆動
    function tick(e) {
      if (!current || !current.tick) return;
      if (current.needsActive && !api.isActive()) {
        if (cfg.inactiveNote) mNote.textContent = cfg.inactiveNote;
        return;
      }
      if (current.tick(e)) clear();
    }
    // 入力: イベント駆動
    function event(name, data) {
      if (!current || current.observe || !current.on || current.on !== name) return;
      if (current.check && !current.check(data)) { mNote.textContent = current.fail ? current.fail(data) : 'もう一度'; return; }
      if (current.check) mNote.textContent = 'ぴったり！✅';
      clear();
    }

    mGuess.addEventListener('click', (ev) => {
      const b = ev.target.closest('button'); if (!b) return;
      markGuess(b.dataset.g);
      if (current && current.onGuess) current.onGuess(b.dataset.g);
    });
    mNext.addEventListener('click', () => { if (current && current.observe) clear(); });
    toggleBtn.addEventListener('click', () => {
      toggleBtn.classList.remove('tut-pulse');
      panel.hidden = !panel.hidden;
      try { localStorage.setItem(SEEN_KEY, '1'); } catch (e) {}
    });
    mRestart.addEventListener('click', () => { mode = 'tutorial'; stepIndex = 0; save(); load(); });
    mMore.addEventListener('click', () => { mode = 'more'; load(); });
    mClose.addEventListener('click', () => { panel.hidden = true; });

    load();
    let seen = false; try { seen = !!localStorage.getItem(SEEN_KEY); } catch (e) {}
    if (!seen) toggleBtn.classList.add('tut-pulse');

    return { tick, event };
  };
})();
</script>
<script>
const timeEl = document.getElementById('time');
const stateEl = document.getElementById('state');
const btn = document.getElementById('btn');
const resetBtn = document.getElementById('reset');
const fillEl = document.getElementById('level-fill');
const thMark = document.getElementById('threshold-mark');
const thSlider = document.getElementById('th');
const thVal = document.getElementById('th-val');
const echoSlider = document.getElementById('echo');
const echoVal = document.getElementById('echo-val');
const errEl = document.getElementById('err');
const historyEl = document.getElementById('history');

let audioCtx = null, analyser = null, stream = null;
let looping = false;     // loop() の二重起動を防ぐ（フォーカス外れ→再開時）
// 連続モード状態機械：拍手のたびに armed→running→paused→running→paused… と切り替わる。
// phyphox の音響ストップウォッチ「Extended モード」と同じ動作。
let mode = 'idle';       // idle | armed | running | paused
let segmentStart = 0;    // 現区間のスタート時刻（audioCtx.currentTime ベース）
let accum = 0;           // 前区間までの累積秒
let lastTrigger = -10;   // 連続トリガー防止
let laps = [];           // 各区間の時間（paused に切り替わるたびに追加）

function echoTime() { return parseFloat(echoSlider.value); }

function updateThUI() {
  thVal.textContent = thSlider.value;
  thMark.style.left = (parseFloat(thSlider.value) * 100) + '%';
}
thSlider.addEventListener('input', updateThUI);
updateThUI();

function updateEchoUI() { echoVal.textContent = echoTime().toFixed(1); }
echoSlider.addEventListener('input', updateEchoUI);
updateEchoUI();

btn.addEventListener('click', async () => {
  // 計測中（armed/running/paused）にボタンを押すと「中断」＝データを捨てて idle へ戻す。
  if (mode !== 'idle') { clearAll(); setIdle(); return; }
  if (!audioCtx) {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: {
        echoCancellation: false, noiseSuppression: false, autoGainControl: false
      }});
    } catch (e) {
      errEl.textContent = 'マイクが使えませんでした：' + e.message;
      return;
    }
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    src.connect(analyser);
    if (!looping) { looping = true; loop(); }   // 既に回っていれば二重起動しない
  }
  clearAll();
  mode = 'armed';
  lastTrigger = audioCtx.currentTime;
  stateEl.textContent = '🎤 最初の音を待っています…';
  stateEl.className = 'waiting';
  btn.textContent = '中断';
  btn.classList.add('stop');
  errEl.textContent = '';
  tut.event('armed');
});

resetBtn.addEventListener('click', () => {
  clearAll();
  setIdle();
});

function clearAll() {
  accum = 0;
  laps = [];
  historyEl.textContent = '';
  timeEl.textContent = '0.00';
}

function setIdle() {
  mode = 'idle';
  stateEl.textContent = '「開始」を押すと、音を待ちます';
  stateEl.className = '';
  btn.textContent = '開始（音を待つ）';
  btn.classList.remove('stop');
}

function updateHistory() {
  if (!laps.length) { historyEl.textContent = ''; return; }
  historyEl.innerHTML = '記録：' +
    laps.map((r, i) => '区間' + (i + 1) + ' ' + r.toFixed(2) + ' 秒').join('、 ');
}

function loop() {
  requestAnimationFrame(loop);
  if (!analyser) return;

  const data = new Float32Array(analyser.fftSize);
  analyser.getFloatTimeDomainData(data);
  let peak = 0;
  for (let i = 0; i < data.length; i++) {
    const a = Math.abs(data[i]);
    if (a > peak) peak = a;
  }
  fillEl.style.width = Math.min(peak * 100, 100) + '%';
  fillEl.style.background = peak >= parseFloat(thSlider.value) ? '#fc6' : '#6f9';

  const now = audioCtx.currentTime;
  const triggered = peak >= parseFloat(thSlider.value) && (now - lastTrigger) > echoTime();

  if (triggered && mode === 'armed') {
    lastTrigger = now;
    segmentStart = now;
    mode = 'running';
    stateEl.textContent = '⏱️ 計測中… もう一度たたくと止まります';
    stateEl.className = 'measuring';
    tut.event('started');
  } else if (triggered && mode === 'running') {
    lastTrigger = now;
    const lap = now - segmentStart;
    accum += lap;
    laps.push(lap);
    mode = 'paused';
    timeEl.textContent = accum.toFixed(2);
    stateEl.textContent = '⏸ 止まりました。もう一度たたくと続きから動きます';
    stateEl.className = 'done';
    updateHistory();
    tut.event('paused', lap);
  } else if (triggered && mode === 'paused') {
    lastTrigger = now;
    segmentStart = now;
    mode = 'running';
    stateEl.textContent = '⏱️ 計測中… もう一度たたくと止まります';
    stateEl.className = 'measuring';
    tut.event('resumed');
  }

  if (mode === 'running') {
    timeEl.textContent = (accum + (now - segmentStart)).toFixed(2);
  }
}

// ---- チュートリアルのステップ定義（判定だけ。器は tutorial.js） ----
// 範囲当て課題（lo〜hi秒の区間をつくる）。秒は上の大きな数字に出るので、ヒントは方向だけ。
// 連続モードでは paused イベントに直前区間の秒が渡ってくる。
function rangeStep(lo, hi) {
  return {
    html: () => lo + '〜' + hi + '秒の区間をつくってみよう',
    on: 'paused',
    check: (lap) => lap >= lo && lap <= hi,
    fail: (lap) => (lap < lo ? 'もう少し長く' : 'もう少し短く'),
  };
}
const RANGE_POOL = [[5,8],[3,5],[6,8],[2,4],[4,6],[7,9],[1,3],[8,10]];   // 幅は必ず1秒以上
const rand = (a) => a[Math.floor(Math.random() * a.length)];

// マイク許可ダイアログの案内。文言はOS・ブラウザ・バージョンで違うため、
// 「許可」の字が入るボタンを押す、という版に依存しない言い方にする。
function micHint() {
  const ua = navigator.userAgent;
  const isIOS = /iPad|iPhone|iPod/.test(ua) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (isIOS) return '（もし「マイクへのアクセスを求めています」と出たら「許可」して下さい）';
  if (/Android/.test(ua)) return '（もしマイクを使ってもいい？と聞かれたら「許可」して下さい）';
  return '（もしマイクを使ってもいい？と聞かれたら「許可」して下さい）';
}

const STEPS = [
  () => ({ html: () => '「開始」を押す<br><br>' + micHint(), on: 'armed' }),
  () => ({ html: () => '手をパンとたたいて、タイマーをスタート', on: 'started' }),
  () => ({ html: () => 'タイマーが動いているのを見てみよう', observe: true }),
  () => ({ html: () => 'もう一度たたくと、タイマーは止まります（一時停止）', on: 'paused' }),
  () => ({ html: () => '下に「区間①」が記録されたね', observe: true }),
  () => ({ html: () => 'もう一度たたくと、続きから動きます', on: 'resumed' }),
  () => ({ html: () => 'さらにもう一度たたいて、もう一区間つくろう', on: 'paused' }),
  () => ({ html: () => '「区間②」も記録されたね', observe: true }),
  // 環境調整（スライダーを右へ動かしたら次へ）。開始時点の値を基準に、そこから右へ増えたら合格。
  () => { const base = parseFloat(thSlider.value);
    return { html: () => 'まわりが騒がしいときは「反応する大きさ（しきい値）」を右へ動かして下さい（やってみる）',
             on: 'slider-th', check: () => parseFloat(thSlider.value) >= base + 0.05, fail: () => '右へ動かしてね' }; },
  () => { const base = parseFloat(echoSlider.value);
    return { html: () => 'ストップウォッチがすぐ止まるときは、「反響を無視する時間」を右へ動かして下さい（やってみる）',
             on: 'slider-echo', check: () => parseFloat(echoSlider.value) >= base + 0.1, fail: () => '右へ動かしてね' }; },
];
const MORE = [ () => { const r = rand(RANGE_POOL); return rangeStep(r[0], r[1]); } ];

const tut = createTutorial({
  keyPrefix: 'phylab-sw',
  mountId: 'tutorialMount',
  toggleBtnId: 'missionBtn',
  steps: STEPS,
  moreSteps: MORE,
  completeText: '🎉 チュートリアル完了！時間の測り方をマスターしたね',
});

// スライダー操作をチュートリアルへ通知（環境調整ステップ用）
thSlider.addEventListener('input', () => tut.event('slider-th'));
echoSlider.addEventListener('input', () => tut.event('slider-echo'));


// 別タブ・別アプリに移ってフォーカスが外れたら、マイクを手放して計測をidleへ戻す
// （チュートリアルの進捗 localStorage は残す）。
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) return;
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  if (audioCtx) { try { audioCtx.close(); } catch (e) {} audioCtx = null; }
  analyser = null;
  setIdle();
});
</script>
<script>
// ============================================================
// 📱 縦向きガード（正本はこのファイル1つ）
// ------------------------------------------------------------
// タブレットを横向きにしたら、全面カバーで「たてに戻してね」と案内する。
// 発動条件は「横向き かつ タッチ端末（pointer: coarse）」。
//   ・iPad / タブレットモードのChromebook … 横向きで発動
//   ・先生のPC / クラムシェル型Chromebook（画面が常に横長・マウス操作）… 発動しない
// 各ページは script タグ（src="orientation-guard.js"）を1行書くだけ。
// ※このコメントに閉じタグを書いてはいけない。ビルドでHTMLへインライン化した
//   とき、コメント内でも閉じタグと解釈されて script が切断されるため。
// CSSだけで判定するのでリスナー不要。カバー中もセンサー計測は裏で続く
// （すぐ縦に戻す前提なので許容）。
// ============================================================
(function () {
  const st = document.createElement('style');
  st.textContent = `
  .rotate-guard { display: none; }
  @media (orientation: landscape) and (pointer: coarse) {
    .rotate-guard {
      display: flex;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #1a1a1a;
      color: #eee;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      font-size: 1.3rem;
      text-align: center;
      font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    }
    .rotate-guard .rg-icon {
      font-size: 3.5rem;
      animation: rg-rotate 1.8s ease-in-out infinite;
    }
    @keyframes rg-rotate {
      0%, 25%  { transform: rotate(90deg); }   /* 横向き（いまの状態） */
      65%, 100% { transform: rotate(0deg); }   /* 縦向き（こうしてね） */
    }
  }`;
  document.head.appendChild(st);

  const d = document.createElement('div');
  d.className = 'rotate-guard';
  d.innerHTML = '<div class="rg-icon">📱</div><div>タブレットを たてに もどしてね</div>';
  document.body.appendChild(d);
})();
</script>
</body>
