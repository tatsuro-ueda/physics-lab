<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>位置（GPS） | 理科実験ラボ</title>
<style>
  :root { --phx-orange: #ffe000; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #1a1a1a;
    color: #eee;
    margin: 0;
  }
  header {
    background: var(--phx-orange);
    color: #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 8px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  header a.back { color: #1a1a1a; text-decoration: none; font-size: 1.4rem; padding: 8px 12px; }
  header .title { font-size: 1.1rem; font-weight: bold; flex: 1; }
  header button {
    background: none; border: none; color: #1a1a1a;
    font-size: 1.5rem; padding: 8px 12px; cursor: pointer;
  }
  main { max-width: 760px; margin: 0 auto; padding: 8px; }
  .values {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .vcard {
    background: #2b2b2b;
    border: 1px solid #333;
    border-radius: 4px;
    padding: 10px;
    text-align: center;
  }
  .vcard .label { font-size: 0.8rem; color: #aaa; }
  .vcard .num {
    font-size: 1.3rem;
    font-variant-numeric: tabular-nums;
    color: var(--phx-orange);
  }
  .vcard .num small { font-size: 0.8rem; color: #888; }
  .card {
    margin-bottom: 10px;
    border: 1px solid #333;
    border-radius: 4px;
    overflow: hidden;
  }
  .card .head {
    background: #2b2b2b;
    display: flex;
    justify-content: space-between;
    padding: 5px 10px;
    font-size: 0.9rem;
  }
  .card canvas { display: block; width: 100%; height: 150px; background: #000; }
  .hint { text-align: center; color: #888; font-size: 0.8rem; margin: 12px 0; }
  #err { color: #f88; text-align: center; }
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">←</a>
  <div class="title">位置（GPS）</div>
  <button id="playBtn" title="計測開始">▶</button>
  <button id="resetBtn" title="データを消す">🗑</button>
</header>

<main>
  <div class="values">
    <div class="vcard"><div class="label">緯度</div><div class="num" id="lat">--</div></div>
    <div class="vcard"><div class="label">経度</div><div class="num" id="lon">--</div></div>
    <div class="vcard"><div class="label">高度</div><div class="num" id="alt">-- <small>m</small></div></div>
    <div class="vcard"><div class="label">速度</div><div class="num" id="spd">-- <small>m/s</small></div></div>
    <div class="vcard"><div class="label">水平精度（誤差の目安）</div><div class="num" id="acc">-- <small>m</small></div></div>
    <div class="vcard"><div class="label">移動きょり（合計）</div><div class="num" id="dist">0 <small>m</small></div></div>
  </div>

  <div class="card">
    <div class="head"><span style="color:#ff9500">高度の変化</span><span id="alt-range" style="color:#888"></span></div>
    <canvas id="cv-alt" width="720" height="300"></canvas>
  </div>
  <div class="card">
    <div class="head"><span style="color:#d4c400">速度の変化</span><span id="spd-range" style="color:#888"></span></div>
    <canvas id="cv-spd" width="720" height="300"></canvas>
  </div>

  <p id="err"></p>
  <p class="hint">
    ▶ を押して位置情報を「許可」すると計測が始まります。<br>
    屋内ではGPSがとどきにくく、誤差が大きくなります。散歩や坂道で試すと変化が見えます。
  </p>
</main>

<script>
const playBtn = document.getElementById('playBtn');
const errEl = document.getElementById('err');
let watchId = null;
let lastPos = null;
let totalDist = 0;
const altBuf = [], spdBuf = [];   // 値（全履歴を保持）
const altT = [], spdT = [];       // 経過時間（秒）。phyphox同様、時間軸を圧縮して全体を表示する
let t0 = null;

// グラフ面タップでその点の値を表示
const marker = { alt: null, spd: null };
const SERIES = { alt: { buf: altBuf, t: altT }, spd: { buf: spdBuf, t: spdT } };

function spanOf(tArr) {
  return Math.max(tArr.length ? tArr[tArr.length - 1] : 0, 10);
}

function nearestIndex(tArr, targetT) {
  let best = 0;
  for (let j = 1; j < tArr.length; j++) {
    if (Math.abs(tArr[j] - targetT) < Math.abs(tArr[best] - targetT)) best = j;
  }
  return best;
}

[['alt', 'cv-alt'], ['spd', 'cv-spd']].forEach(([key, id]) => {
  const cvEl = document.getElementById(id);
  cvEl.addEventListener('click', (ev) => {
    const rect = cvEl.getBoundingClientRect();
    const s = SERIES[key];
    if (s.t.length < 2) return;
    marker[key] = nearestIndex(s.t, (ev.clientX - rect.left) / rect.width * spanOf(s.t));
  });
});

playBtn.addEventListener('click', () => {
  if (watchId !== null) {           // 停止
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
    playBtn.textContent = '▶';
    return;
  }
  if (!('geolocation' in navigator)) {
    errEl.textContent = 'この端末・ブラウザでは位置情報が使えません';
    return;
  }
  watchId = navigator.geolocation.watchPosition(onPos, onErr, {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 15000
  });
  // 再開時：ポーズしていた時間を除いて時間軸を連続させる
  const lastT = Math.max(altT.length ? altT[altT.length - 1] : 0,
                         spdT.length ? spdT[spdT.length - 1] : 0);
  if (lastT) t0 = performance.now() / 1000 - lastT;
  marker.alt = null; marker.spd = null;   // 再開時はタップ値の表示を消す
  playBtn.textContent = '⏸';
  errEl.textContent = '';
  draw();
});

// リセット：計測を止めてデータを消す
document.getElementById('resetBtn').addEventListener('click', () => {
  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  playBtn.textContent = '▶';
  t0 = null;
  altBuf.length = 0; spdBuf.length = 0;
  altT.length = 0; spdT.length = 0;
  marker.alt = null; marker.spd = null;
  totalDist = 0; lastPos = null;
  document.getElementById('lat').textContent = '--';
  document.getElementById('lon').textContent = '--';
  document.getElementById('alt').innerHTML = '-- <small>m</small>';
  document.getElementById('spd').innerHTML = '-- <small>m/s</small>';
  document.getElementById('acc').innerHTML = '-- <small>m</small>';
  document.getElementById('dist').innerHTML = '0 <small>m</small>';
  document.getElementById('alt-range').textContent = '';
  document.getElementById('spd-range').textContent = '';
  ['cv-alt', 'cv-spd'].forEach(id => {
    const c = document.getElementById(id);
    c.getContext('2d').clearRect(0, 0, c.width, c.height);
  });
});

function onPos(pos) {
  const c = pos.coords;
  document.getElementById('lat').textContent = c.latitude.toFixed(6);
  document.getElementById('lon').textContent = c.longitude.toFixed(6);
  document.getElementById('alt').innerHTML =
    (c.altitude === null ? '--' : c.altitude.toFixed(1)) + ' <small>m</small>';
  document.getElementById('spd').innerHTML =
    (c.speed === null ? '--' : c.speed.toFixed(1)) + ' <small>m/s</small>';
  document.getElementById('acc').innerHTML = c.accuracy.toFixed(0) + ' <small>m</small>';

  const nowS = performance.now() / 1000;
  if (t0 === null) t0 = nowS;
  const t = nowS - t0;
  if (c.altitude !== null) { altBuf.push(c.altitude); altT.push(t); }
  if (c.speed !== null) { spdBuf.push(c.speed); spdT.push(t); }

  // 移動きょりの積算（ハバースイン近似）
  if (lastPos) {
    const d = distMeters(lastPos.latitude, lastPos.longitude, c.latitude, c.longitude);
    if (d > c.accuracy * 0.5) {     // 誤差のゆらぎは足さない
      totalDist += d;
      document.getElementById('dist').innerHTML = totalDist.toFixed(0) + ' <small>m</small>';
      lastPos = c;
    }
  } else {
    lastPos = c;
  }
}

function onErr(e) {
  const msg = { 1: '位置情報の使用が許可されませんでした', 2: '位置を取得できませんでした', 3: '取得がタイムアウトしました' };
  errEl.textContent = msg[e.code] || e.message;
}

function distMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000, rad = Math.PI / 180;
  const dLat = (lat2 - lat1) * rad, dLon = (lon2 - lon1) * rad;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*rad) * Math.cos(lat2*rad) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function draw() {
  if (watchId === null) return;
  requestAnimationFrame(draw);
  drawGraph(document.getElementById('cv-alt'), altT, altBuf, '#ff9500', 'alt-range', 'm', marker.alt);
  drawGraph(document.getElementById('cv-spd'), spdT, spdBuf, '#d4c400', 'spd-range', 'm/s', marker.spd);
}

// 時間軸の目もり幅を選ぶ（画面内に2〜8本になるように）
function pickTimeStep(span) {
  const steps = [1, 2, 5, 10, 15, 30, 60, 120, 300, 600];
  for (const s of steps) if (span / s <= 8) return s;
  return 1200;
}

function drawGraph(cv, tArr, arr, color, rangeId, unit, mIdx) {
  const ctx = cv.getContext('2d');
  const W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  if (arr.length < 2) {
    ctx.fillStyle = '#666';
    ctx.font = '16px sans-serif';
    ctx.fillText('データ待ち…（GPSは数秒〜数十秒かかります）', 20, H / 2);
    return;
  }

  let min = Math.min(...arr), max = Math.max(...arr);
  const pad = Math.max((max - min) * 0.15, 1);
  min -= pad; max += pad;
  document.getElementById(rangeId).textContent =
    min.toFixed(0) + '〜' + max.toFixed(0) + ' ' + unit;

  const span = spanOf(tArr);
  const toX = t => (t / span) * W;
  const toY = v => H - ((v - min) / (max - min)) * H;

  ctx.strokeStyle = '#2a2a2a';
  ctx.fillStyle = '#888';
  ctx.font = '13px sans-serif';
  for (let i = 0; i <= 4; i++) {
    const v = min + (max - min) * i / 4;
    const y = toY(v);
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    ctx.fillText(v.toFixed(1), 6, Math.min(Math.max(y - 4, 14), H - 4));
  }
  // 縦グリッド（時間）
  const tStep = pickTimeStep(span);
  for (let t = tStep; t < span; t += tStep) {
    const x = toX(t);
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    ctx.fillText(Math.round(t) + 's', x + 4, H - 6);
  }

  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  for (let i = 0; i < arr.length; i++) {
    const x = toX(tArr[i]);
    const y = toY(arr[i]);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // タップした点の値（有効数字2桁）
  if (mIdx !== null && mIdx < arr.length) {
    const i = mIdx;
    const x = toX(tArr[i]);
    const y = toY(arr[i]);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();
    const label = Number(arr[i].toPrecision(2)).toString();
    ctx.font = 'bold 16px sans-serif';
    const tw = ctx.measureText(label).width;
    const lx = Math.min(Math.max(x - tw / 2, 4), W - tw - 4);
    const ly = y > 34 ? y - 14 : y + 28;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(lx - 4, ly - 16, tw + 8, 22);
    ctx.fillStyle = '#fff';
    ctx.fillText(label, lx, ly);
  }
}
</script>
</body>
</html>
