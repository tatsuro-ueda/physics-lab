<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コンパス（磁気センサー） | スマホ物理実験ラボ</title>
<style>
  :root { --phx-orange: #ffe000; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: #1a1a1a;
    color: #eee;
    margin: 0;
    text-align: center;
  }
  header {
    background: var(--phx-orange);
    color: #1a1a1a;
    display: flex;
    align-items: center;
    padding: 0 8px;
    height: 52px;
    position: sticky;
    top: 0;
    z-index: 10;
    text-align: left;
  }
  header a.back { color: #1a1a1a; text-decoration: none; font-size: 1.4rem; padding: 8px 12px; }
  header .title { font-size: 1.1rem; font-weight: bold; flex: 1; }
  header button {
    background: none; border: none; color: #1a1a1a;
    font-size: 1.5rem; padding: 8px 12px; cursor: pointer;
  }
  #deg {
    font-size: 3rem;
    font-variant-numeric: tabular-nums;
    margin: 16px 0 0;
    color: var(--phx-orange);
  }
  #dir { font-size: 1.4rem; color: #bbb; min-height: 2rem; }
  canvas { margin: 8px auto; display: block; }
  .hint { color: #888; font-size: 0.8rem; margin: 12px; }
  #err { color: #f88; }
  #src { color: #678; font-size: 0.75rem; }
</style>
</head>
<body>
<header>
  <a class="back" href="index.html">←</a>
  <div class="title">コンパス（磁気センサー）</div>
  <button id="playBtn" title="計測開始">▶</button>
  <button id="resetBtn" title="データを消す">🗑</button>
</header>

<div id="deg">--°</div>
<div id="dir"></div>
<canvas id="cv" width="320" height="320"></canvas>
<p id="err"></p>
<p id="src"></p>
<p class="hint">
  端末を水平に持って、ゆっくり回してみよう。<br>
  数字が動かないときは、8の字に振ると磁気センサーが調整（キャリブレーション）されます。<br>
  磁石を近づけると北がずれるのも実験になります。<br>
  ※ノート型Chromebookなど、磁気センサーが無い端末では動きません。
</p>

<script>
const playBtn = document.getElementById('playBtn');
const errEl = document.getElementById('err');
const degEl = document.getElementById('deg');
const dirEl = document.getElementById('dir');
const srcEl = document.getElementById('src');
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

let heading = null;
let running = false;
let listening = false;
let gotData = false;
const DIRS = ['北', '北東', '東', '南東', '南', '南西', '西', '北西'];

playBtn.addEventListener('click', async () => {
  if (running) { running = false; playBtn.textContent = '▶'; return; }
  if (!listening) {
    // iOS 13+ は deviceorientation にも許可が必要
    if (typeof DeviceOrientationEvent !== 'undefined' &&
        typeof DeviceOrientationEvent.requestPermission === 'function') {
      try {
        const res = await DeviceOrientationEvent.requestPermission();
        if (res !== 'granted') { errEl.textContent = 'センサーの使用が許可されませんでした'; return; }
      } catch (e) {
        errEl.textContent = '許可の取得に失敗：' + e.message; return;
      }
    }
    // 絶対方位イベントがあれば優先（Android/ChromeOS系）
    if ('ondeviceorientationabsolute' in window) {
      window.addEventListener('deviceorientationabsolute', onOrient);
    } else {
      window.addEventListener('deviceorientation', onOrient);
    }
    listening = true;
    setTimeout(() => {
      if (!gotData) errEl.textContent = 'この端末では方位データが取れないようです（磁気センサー非搭載の可能性）';
    }, 3000);
    drawLoop();
  }
  running = true;
  errEl.textContent = '';
  playBtn.textContent = '⏸';
});

// リセット：計測を止めて表示を消す
document.getElementById('resetBtn').addEventListener('click', () => {
  running = false;
  playBtn.textContent = '▶';
  heading = null;
  degEl.textContent = '--°';
  dirEl.textContent = '';
  srcEl.textContent = '';
  errEl.textContent = '';
});

function onOrient(e) {
  if (!running) return;
  let h = null;
  if (typeof e.webkitCompassHeading === 'number') {
    h = e.webkitCompassHeading;                 // iOS：北=0で時計回り
    srcEl.textContent = 'データ源：webkitCompassHeading（iOS）';
  } else if (e.absolute && e.alpha !== null) {
    h = (360 - e.alpha) % 360;                  // 絶対方位：alphaから換算
    srcEl.textContent = 'データ源：deviceorientationabsolute';
  } else if (e.alpha !== null) {
    h = (360 - e.alpha) % 360;                  // 相対値（起動時の向きが基準）
    srcEl.textContent = 'データ源：deviceorientation（相対値。真北とは限りません）';
  }
  if (h === null) return;
  gotData = true;
  heading = h;
  degEl.textContent = Math.round(h) + '°';
  dirEl.textContent = DIRS[Math.round(h / 45) % 8];
}

function drawLoop() {
  requestAnimationFrame(drawLoop);
  const W = cv.width, H = cv.height, cx = W/2, cy = H/2, R = 130;
  ctx.clearRect(0, 0, W, H);

  // 目盛り盤
  ctx.strokeStyle = '#444';
  ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI*2); ctx.stroke();
  ctx.fillStyle = '#aaa';
  ctx.font = 'bold 20px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const rot = heading === null ? 0 : -heading * Math.PI / 180;
  [['N', 0], ['E', 90], ['S', 180], ['W', 270]].forEach(([label, ang]) => {
    const a = (ang * Math.PI / 180) + rot - Math.PI/2;
    ctx.fillStyle = label === 'N' ? '#e04040' : '#aaa';
    ctx.fillText(label, cx + Math.cos(a) * (R - 22), cy + Math.sin(a) * (R - 22));
  });
  // 小目盛り（30°ごと）
  ctx.strokeStyle = '#555';
  for (let d = 0; d < 360; d += 30) {
    const a = (d * Math.PI / 180) + rot - Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx + Math.cos(a) * R, cy + Math.sin(a) * R);
    ctx.lineTo(cx + Math.cos(a) * (R - 10), cy + Math.sin(a) * (R - 10));
    ctx.stroke();
  }

  // 中央の固定針（端末の向き）
  ctx.strokeStyle = '#ffe000';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(cx, cy + 20);
  ctx.lineTo(cx, cy - R + 30);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, cy - R + 18);
  ctx.lineTo(cx - 8, cy - R + 34);
  ctx.lineTo(cx + 8, cy - R + 34);
  ctx.closePath();
  ctx.fillStyle = '#ffe000';
  ctx.fill();
  ctx.lineWidth = 1;
}
</script>
</body>
</html>
